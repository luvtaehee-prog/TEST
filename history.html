<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역사 뿌수기: 2학년 6반 최후의 1인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0E5C3F; --green-d:#093F2B; --green-l:#13754F;
  --ivory:#F6F4EC; --paper:#FFFFFF; --ink:#1A2421; --mute:#6B7670;
  --gold:#E8B53D; --gold-d:#C7951E; --xp:#22C55E;
  --ok:#15803D; --ok-bg:#E7F5EC; --no:#B91C1C; --no-bg:#FBEAEA;
  --line:#E2E0D6; --lock:#B7B5AA;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--ivory);color:var(--ink);
  font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif;line-height:1.7}
.han{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-weight:400;letter-spacing:.01em}
.disp{font-family:'Gowun Batang',serif}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* App header */
header{background:linear-gradient(135deg,var(--green) 0%,var(--green-d) 70%);color:#fff;
  padding:20px 18px 16px;position:relative;overflow:hidden}
header::after{content:"⚔️";position:absolute;right:14px;top:10px;font-size:64px;opacity:.12;transform:rotate(-15deg)}
.title{font-size:24px;line-height:1.15;margin:0;text-shadow:0 2px 0 rgba(0,0,0,.18)}
.title b{color:var(--gold)}
.by{font-size:12px;opacity:.82;margin-top:4px}
.by b{color:var(--gold)}

/* Player panel */
.player{max-width:860px;margin:-10px auto 0;padding:0 16px;position:relative;z-index:2}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px 16px;
  box-shadow:0 6px 18px rgba(14,92,63,.10)}
.prow{display:flex;align-items:center;gap:12px}
.badge{flex:0 0 auto;width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#3a2c05;font-weight:900;box-shadow:0 3px 0 var(--gold-d)}
.badge small{font-size:9px;line-height:1;opacity:.8}
.badge b{font-size:20px;line-height:1}
.pinfo{flex:1;min-width:0}
.ptitle{font-weight:900;font-size:17px;color:var(--green)}
.pstat{font-size:12px;color:var(--mute);margin-top:1px}
.pstat .dot{color:var(--gold-d);font-weight:700}
.xpwrap{margin-top:10px}
.xpbar{height:12px;background:#EDEBDF;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.xpfill{height:100%;background:linear-gradient(90deg,var(--xp),#16A34A);width:0;transition:width .6s cubic-bezier(.2,.8,.2,1);border-radius:8px}
.xptext{font-size:11px;color:var(--mute);margin-top:4px;display:flex;justify-content:space-between}

main{max-width:860px;margin:0 auto;padding:14px 16px 90px}

/* Finale banner */
.finale-card{margin:14px 0 8px;border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(120deg,#6D28D9,#9333EA)}
.finale-card.locked{background:#D9D7CC;color:#7A786E}
.finale-card h3{margin:0;font-size:19px}
.finale-card p{margin:4px 0 12px;font-size:12.5px;opacity:.92}
.finale-card .btn{background:#fff;color:#7C3AED;border:none;border-radius:10px;padding:10px 16px;font-weight:900;font-size:14px}
.finale-card.locked .btn{background:#bbb9ad;color:#fff;cursor:not-allowed}
.finale-card .fx{position:absolute;right:-6px;bottom:-14px;font-size:80px;opacity:.18}

.sectionlabel{font-size:12px;font-weight:800;color:var(--mute);letter-spacing:.08em;margin:18px 2px 8px;text-transform:uppercase}
.reviewbtn{float:right;font-size:11px;border:1px solid var(--line);background:#fff;color:var(--mute);border-radius:20px;padding:4px 11px;font-weight:700}
.reviewbtn.on{background:var(--green);color:#fff;border-color:var(--green)}

/* World rows */
.world{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin:0 0 10px;overflow:hidden}
.world.locked{opacity:.6}
.whead{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;user-select:none}
.wno{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--green);color:#fff;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center}
.world.locked .wno{background:var(--lock)}
.wtitle{flex:1;min-width:0}
.wtitle b{font-size:15px;display:block}
.wtitle small{font-size:11px;color:var(--mute)}
.wmeta{font-size:12px;color:var(--gold-d);font-weight:800;white-space:nowrap}
.wmeta .lk{color:var(--lock)}
.chev{transition:transform .2s;color:var(--mute);font-size:13px}
.world.open .chev{transform:rotate(90deg)}
.stages{display:none;padding:4px 12px 14px;gap:8px;flex-wrap:wrap}
.world.open .stages{display:flex}
.stage{flex:1 1 calc(50% - 8px);min-width:200px;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;background:#FBFAF4;
  display:flex;align-items:center;gap:10px;cursor:pointer;transition:.12s}
.stage:hover{border-color:var(--green-l);background:#fff}
.stage.locked{opacity:.55;cursor:not-allowed;background:#F1F0E8}
.stage .sno{flex:0 0 auto;font-size:11px;font-weight:800;color:var(--green);background:#fff;border:1px solid var(--line);border-radius:7px;padding:2px 7px}
.stage .stt{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.stage .stars{flex:0 0 auto;font-size:13px;letter-spacing:-1px;color:var(--gold)}
.stage .stars .e{color:#D9D7CC}

/* Quiz screen */
#quiz .qbar{position:sticky;top:0;z-index:20;background:var(--ivory);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;padding:11px 16px}
.backbtn{border:none;background:none;color:var(--green);font-weight:800;font-size:14px;padding:4px}
.qbar .qh{flex:1;min-width:0}
.qbar .qh b{font-size:15px;display:block;line-height:1.2}
.qbar .qh small{font-size:11px;color:var(--mute)}
.qbody{max-width:860px;margin:0 auto;padding:8px 16px 30px}
.q{display:flex;gap:11px;padding:12px 2px;border-bottom:1px dashed var(--line)}
.q:last-child{border-bottom:none}
.qn{flex:0 0 auto;width:26px;height:26px;margin-top:1px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.qt{flex:1;font-size:15.5px}
.blank{position:relative;display:inline-flex;align-items:center;vertical-align:baseline}
.blank input{font-family:inherit;font-size:15px;text-align:center;color:var(--green-d);font-weight:700;border:none;
  border-bottom:2px solid var(--green-l);background:#FBFAF4;min-width:64px;padding:1px 7px;margin:0 2px;border-radius:4px 4px 0 0}
.blank input:focus{outline:none;background:#fff;border-bottom-color:var(--gold);box-shadow:0 2px 0 -1px var(--gold)}
.blank input.ok{color:var(--ok);border-bottom-color:var(--ok);background:var(--ok-bg)}
.blank input.no{color:var(--no);border-bottom-color:var(--no);background:var(--no-bg)}
.ansnote{display:none;font-size:13px;font-weight:700;margin-left:3px;padding:0 5px;border-radius:5px;white-space:nowrap}
.ansnote.show{display:inline-block;color:#fff;background:var(--green)}
.ansnote.show::before{content:"정답 ";font-weight:400;opacity:.75;font-size:11px}
.qfoot{position:sticky;bottom:0;background:linear-gradient(0deg,var(--ivory) 70%,transparent);padding:12px 16px;
  max-width:860px;margin:0 auto;display:flex;gap:8px}
.qfoot button{flex:1;border-radius:11px;padding:13px;font-weight:900;font-size:15px;border:1.5px solid var(--green)}
.qfoot .ghost{background:#fff;color:var(--green);flex:0 0 auto;padding:13px 16px}
.qfoot .go{background:var(--green);color:#fff}
.qfoot .go:hover{background:var(--green-d)}

/* Modal */
.scrim{position:fixed;inset:0;background:rgba(9,40,30,.55);display:flex;align-items:center;justify-content:center;
  z-index:60;padding:18px;opacity:0;pointer-events:none;transition:.2s}
.scrim.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:20px;max-width:380px;width:100%;padding:24px 22px;text-align:center;
  transform:scale(.92);transition:.2s;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.scrim.show .modal{transform:scale(1)}
.modal .bigstars{font-size:40px;letter-spacing:2px;color:var(--gold)}
.modal .bigstars .e{color:#E4E2D6}
.modal h2{margin:6px 0 2px;font-size:22px}
.modal .acc{font-size:14px;color:var(--mute)}
.modal .xpget{margin:14px auto;background:var(--ok-bg);color:var(--ok);font-weight:900;font-size:16px;border-radius:12px;padding:10px;max-width:220px}
.modal .xpget.none{background:#F1F0E8;color:var(--mute)}
.lvlup{margin:10px auto;background:linear-gradient(90deg,var(--gold),var(--gold-d));color:#3a2c05;font-weight:900;
  padding:10px;border-radius:12px;font-size:15px;animation:pop .4s}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.modal .mbtns{display:flex;gap:8px;margin-top:6px}
.modal .mbtns button{flex:1;border-radius:11px;padding:12px;font-weight:800;font-size:14px;border:1.5px solid var(--green)}
.modal .mbtns .sec{background:#fff;color:var(--green)}
.modal .mbtns .pri{background:var(--green);color:#fff}

/* Finale */
#finale{position:fixed;inset:0;background:linear-gradient(160deg,#2E1065,#4C1D95 60%,#5B21B6);color:#fff;z-index:55;
  display:flex;flex-direction:column;padding:18px;overflow:auto}
#finale .ftop{display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto;width:100%}
#finale .lives{font-size:20px;letter-spacing:1px}
#finale .fprog{flex:1;font-weight:800;font-size:14px;opacity:.9}
#finale .fscore{font-weight:900;font-size:15px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px}
#finale .fclose{border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:10px;padding:7px 12px;font-weight:800}
#finale .fcard{max-width:640px;margin:auto;width:100%;background:rgba(255,255,255,.97);color:var(--ink);
  border-radius:20px;padding:26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
#finale .qlabel{font-size:12px;font-weight:800;color:#7C3AED;letter-spacing:.05em}
#finale .ftext{font-size:19px;line-height:1.6;margin:10px 0 18px;font-weight:500}
#finale .ftext .blank input{font-size:18px;min-width:90px;border-bottom-color:#7C3AED}
#finale .ftext .blank input:focus{box-shadow:0 2px 0 -1px #7C3AED;border-bottom-color:#7C3AED}
#finale .fsubmit{width:100%;background:#7C3AED;color:#fff;border:none;border-radius:12px;padding:14px;font-weight:900;font-size:16px}
#finale .fend{text-align:center}
#finale .fend .big{font-size:54px}
#finale .fend h2{font-size:26px;margin:6px 0}
#finale .fend .rank{font-size:18px;font-weight:900;color:#7C3AED;background:#fff;display:inline-block;padding:8px 18px;border-radius:30px;margin:8px 0}
#finale .fend button{margin-top:14px;background:#fff;color:#7C3AED;border:none;border-radius:12px;padding:13px 22px;font-weight:900;font-size:15px}
.flash{animation:flash .5s}
@keyframes flash{0%{background:#fff}30%{background:var(--no-bg)}100%{background:#fff}}

/* Toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--green-d);color:#fff;
  padding:12px 22px;border-radius:30px;font-weight:800;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{max-width:860px;margin:0 auto;padding:0 16px 36px;color:var(--mute);font-size:11px;text-align:center}
@media(max-width:560px){.title{font-size:20px}.stage{flex-basis:100%}.qt{font-size:15px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- HOME / MAP -->
<div id="home">
  <header>
    <h1 class="title han">역사 뿌수기<br><b>2학년 6반 최후의 1인</b></h1>
    <div class="by">배포 <b>한도윤</b> · 골든벨 서바이벌 · 빈칸 <span id="totBlanks">0</span>개 · 칸 채우면 정답 바로 확인</div>
  </header>
  <div class="player">
    <div class="pcard">
      <div class="prow">
        <div class="badge"><small>LV</small><b id="pLv">1</b></div>
        <div class="pinfo">
          <div class="ptitle" id="pTitle">역사 쌩초보</div>
          <div class="pstat"><span class="dot">★ <b id="pStars">0</b></span> &nbsp;·&nbsp; 클리어 <b id="pClear">0</b>/49 스테이지</div>
        </div>
      </div>
      <div class="xpwrap">
        <div class="xpbar"><div class="xpfill" id="xpFill"></div></div>
        <div class="xptext"><span id="xpNow">0 XP</span><span id="xpNext">다음 레벨까지 600</span></div>
      </div>
    </div>
  </div>
  <main>
    <div id="finaleCard"></div>
    <div class="sectionlabel">퀘스트 지도
      <button class="reviewbtn" id="reviewBtn">🔓 복습 모드</button>
    </div>
    <div id="worlds"></div>
  </main>
  <footer>틀려도 목숨 안 깎임(복습용) · 결승전만 목숨 3개 · 진행상황은 이 기기에 저장됩니다<br>© AXISOLVE · 역사① 직전 요약 노트 기반</footer>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <div class="qbar">
    <button class="backbtn" onclick="goHome()">← 지도</button>
    <div class="qh"><b id="qTitle"></b><small id="qSub"></small></div>
  </div>
  <div class="qbody" id="qBody"></div>
  <div class="qfoot">
    <button class="ghost" id="revealBtn" onclick="toggleReveal()">정답</button>
    <button class="go" onclick="gradeStage()">도전 완료!</button>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>

<!-- FINALE -->
<div id="finale" class="hidden"></div>

<div class="toast" id="toast"></div>

<script>
const BANK = {
"1-1":{short:"역사의 의미",pages:[
{no:"1쪽",title:"역사의 의미 · 역사 학습의 목적",items:[
`역사는 과거에 실제로 일어났던 일이며, 인류가 남긴 물질문명과 [[정신적]] 유산을 포함한 모든 발자취이다.`,
`과거에 일어난 사실 그 자체를 가리키는 객관적 의미의 역사를 '[[사실]]로서의 역사'라 한다.`,
`기록한 사람의 관점과 해석이 담긴 주관적 의미의 역사를 '[[기록]]으로서의 역사'라 한다.`,
`'사실로서의 역사'는 [[객관적]] 의미에 해당한다.`,
`'기록으로서의 역사'는 [[주관적]] 의미에 해당한다.`,
`동일한 역사적 사건도 [[관점]]에 따라 다르게 평가될 수 있다.`,
`역사를 공부할 때에는 역사가의 [[관점]]을 파악하는 것이 중요하다.`,
`일기장, 옛 사진, 역사책처럼 우리는 [[일상]]에서도 역사를 만날 수 있다.`,
`역사를 소재로 한 드라마, 영화, [[뮤지컬]] 등도 일상 속에서 만나는 역사이다.`,
`역사 자료를 논리적·체계적으로 탐구하며 분석력, [[비판력]], 판단력 등 사고 능력을 키운다.`,
`역사 학습으로 분석력과 함께 역사적 [[상상력]]을 기를 수 있다.`,
`오랜 기간 형성된 유산과 전통을 바탕으로 우리의 현재 위치를 파악하는 것은 [[정체성]] 확인이다.`,
`정체성 확인을 통해 우리가 앞으로 나아갈 [[방향]]을 모색한다.`,
`과거 사람들의 모습을 통해 삶의 [[지혜]]와 교훈을 얻을 수 있다.`,
`다른 시공간 사람들의 발자취를 탐구하여 서로의 문화를 [[존중]]하는 태도를 기를 수 있다.`,
`세계화 추세 속에서 역사 학습으로 문화의 [[다양성]]을 이해하는 태도를 기를 필요가 있다.`,
`역사 학습은 단순 암기가 아니라 [[사고력]]과 비판력을 기르는 데 도움이 된다.`,
`인류가 만든 물질문명과 정신적 유산은 모두 역사에 [[포함]]된다.`,
`역사를 배워 다른 문화를 [[배척]]하는 것이 아니라 존중하는 태도를 길러야 한다.`,
`역사가는 기록을 남길 때 자신의 관점과 [[해석]]을 담는다.`,
`역사에는 '사실로서의 역사'와 '[[기록]]으로서의 역사'라는 두 가지 의미가 있다.`
]},
{no:"2쪽",title:"사료와 역사 연구 · 역사 탐구 과정",items:[
`옛사람들이 남긴 흔적으로, 역사를 탐구하거나 역사책을 서술하는 데 이용되는 자료를 [[사료]]라 한다.`,
`인류가 만들고 사용한 것 중 부피가 작고 옮길 수 있는 것을 [[유물]]이라 한다.`,
`인류가 남긴 자취로 옮길 수 없는 궁궐·집터·고분 등을 [[유적]]이라 한다.`,
`상감 청자, 로제타석 등은 [[유물]]에 해당한다.`,
`일기, 편지, 문서, 비석 등 글자로 남긴 사료를 [[문자]] 기록이라 한다.`,
`그림, 조각, 사진, 영상, 구술 자료 등은 [[비문자]] 기록이다.`,
`사료에는 기록자의 주관이나 잘못된 사실이 반영될 수 있어 비판적으로 검토하는 [[사료 비판]]이 필요하다.`,
`역사 탐구 과정의 첫 단계는 탐구 [[주제]]를 선정하는 것이다.`,
`우리 생활과 관련된 모든 [[소재]]가 역사 탐구의 주제가 될 수 있다.`,
`자료 수집 단계에서는 인터넷, 박물관, [[도서관]] 등에서 자료를 수집한다.`,
`자료 수집 시 인터뷰나 [[답사]]를 활용하기도 한다.`,
`자료 분석 단계에서는 자료의 출처 및 [[신뢰성]]을 검증한다.`,
`자료 분석 단계에서는 자료 내용의 모순·[[오류]] 등을 파악한다.`,
`탐구 결과는 그림, 연표, 도표, [[지도]] 등 다양한 자료를 활용해 정리한다.`,
`탐구 결과는 보고서, 신문, [[카드 뉴스]], 동영상 등으로 표현할 수 있다.`,
`탐구 결과를 발표할 때 다른 주장이나 해석이 나오면 [[논쟁]]의 과정을 거친다.`,
`사료가 과거의 사실을 모두 정확히 보여주는 것은 아니므로 [[검증]] 과정이 필요하다.`,
`수집한 자료는 출처를 명확히 밝히고 자료 간 [[교차]] 검토 과정을 반드시 거쳐야 한다.`,
`유물·유적과 기록물은 모두 [[사료]]의 종류에 속한다.`,
`자료를 검증한 후 [[분석]]하고 해석하는 단계를 거친다.`,
`궁궐, 집터, 고분처럼 옮길 수 없는 것은 유물이 아니라 [[유적]]이다.`,
`'역사를 탐구하는 데 이용되는 각종 자료'라는 정의에 해당하는 용어는 [[사료]]이다.`
]}
]},
"2-1":{short:"문명의 발생",pages:[
{no:"1쪽",title:"인류의 출현과 진화 · 구석기 시대",items:[
`최초의 인류로 약 400~390만 년 전 출현한 인류는 [[오스트랄로피테쿠스 아파렌시스]]이다.`,
`오스트랄로피테쿠스 아파렌시스는 두 발로 서서 걸었으며 손으로 간단한 [[도구]]를 만들어 사용하였다.`,
`약 180만 년 전 출현하여 불과 간단한 언어를 사용한 인류는 [[호모 에렉투스]]이다.`,
`약 40만 년 전 출현해 죽은 사람을 매장하는 풍습이 있었던 인류는 [[호모 네안데르탈렌시스]]이다.`,
`죽은 사람을 매장하는 풍습은 [[사후 세계]]에 대한 관심을 보여준다.`,
`약 20만 년 전 출현한 현생 인류의 조상은 [[호모 사피엔스]]이다.`,
`호모 사피엔스의 대표적인 예는 [[크로마뇽인]]이다.`,
`호모 사피엔스는 동굴에 [[벽화]]를 남겼다.`,
`구석기 시대는 인류가 처음 등장한 시기부터 약 [[1만]] 년 전까지의 시기이다.`,
`구석기 시대에는 돌을 깨뜨리거나 떼어내 만든 [[뗀석기]]를 사용하였다.`,
`주먹도끼, 긁개, 찍개, 찌르개 등은 구석기 시대의 [[뗀석기]]이다.`,
`구석기인은 채집과 사냥, [[어로]](물고기 잡이)를 통해 식량을 확보하였다.`,
`구석기인은 먹을 것을 찾아 무리를 지어 [[이동]] 생활을 하였다.`,
`구석기인은 동굴, 바위 그늘, [[막집]]에 거주하였다.`,
`구석기 사회는 지배와 피지배가 나뉘지 않은 [[평등]]한 사회였다.`,
`구석기인은 풍부한 사냥감을 기원하며 동굴에 [[벽화]]를 그렸다.`,
`에스파냐의 [[알타미라]] 동굴 벽화는 구석기 시대 예술의 예이다.`,
`프랑스의 [[라스코]] 동굴 벽화는 구석기 시대의 대표적 벽화이다.`,
`다산과 풍요를 기원하며 만든 구석기 시대 조각품의 예는 [[빌렌도르프의 비너스]]이다.`,
`호모 에렉투스는 최초로 [[불]]과 간단한 언어를 사용하였다.`,
`구석기인은 사냥을 위한 협력 과정에서 [[언어]]가 발달하였다.`
]},
{no:"2쪽",title:"신석기 시대 · 문명의 발생",items:[
`신석기 시대는 약 1만 년 전 [[빙하기]]가 끝나고 지구 기온이 상승하면서 시작되었다.`,
`돌을 갈거나 다듬어 만든 도구를 [[간석기]]라 한다.`,
`돌낫, 돌괭이, 갈돌과 갈판 등은 신석기 시대의 [[간석기]]이다.`,
`신석기 시대에는 식량을 저장·보관하기 위해 [[토기]]를 사용하였다.`,
`신석기 시대에 실을 뽑는 데 사용한 도구는 [[가락바퀴]]이다.`,
`신석기 시대에 옷·그물을 만들 때 [[뼈바늘]]을 이용하였다.`,
`농경과 목축의 시작으로 나타난 큰 변화를 [[신석기 혁명]]이라 한다.`,
`신석기인은 강가 등에 [[움집]]을 짓고 정착 생활을 하였다.`,
`신석기 시대에는 씨족을 기반으로 [[부족]]을 형성하였다.`,
`신석기 사회도 생산물을 고르게 나누는 [[평등]] 사회였다.`,
`태양·물·바위 등 자연물에 영혼이 있다고 믿는 신앙을 [[원시 신앙]]이라 한다.`,
`사슴·곰 등 특정 동물을 부족의 수호신으로 숭배하는 것을 [[토테미즘]]이라 한다.`,
`농사를 위해 큰 강 주변에 모여 살며 [[관개]] 수로 건설에 많은 노동력이 필요해졌다.`,
`농업 생산량 증대로 [[잉여]] 생산물과 사유 재산이 발생하였다.`,
`사유 재산의 발생으로 빈부 격차와 [[계급]]이 생겨났다.`,
`지배 계급이 [[청동기]]를 사용하고 정복 활동을 벌이며 도시 국가가 출현하였다.`,
`통치와 교역에 관한 것을 기록하고자 [[문자]]를 사용하기 시작하였다.`,
`메소포타미아 문명은 티그리스강과 [[유프라테스]]강 사이에서 발생하였다.`,
`이집트 문명은 [[나일]]강 유역에서, 인도 문명은 인더스강 유역에서 발생하였다.`,
`중국 문명은 [[황허]]강 유역에서 발생하였다.`,
`고대 문명은 모두 [[큰 강 유역]]의 온화한 기후 지대에서 발생하였다.`
]},
{no:"3쪽",title:"메소포타미아 문명 · 이집트 문명",items:[
`기원전 3500년경 티그리스강과 유프라테스강 사이에서 발생한 세계 최초의 문명은 [[메소포타미아]] 문명이다.`,
`메소포타미아 문명은 [[개방적]] 지형으로 외부 침략이 많았다.`,
`잦은 침략으로 메소포타미아인은 [[현재]]의 삶을 중시하였다.`,
`메소포타미아에서 우르, 라가시 등 도시 국가를 건설한 사람들은 [[수메르인]]이다.`,
`수메르인이 도시 중앙에 세운 신전을 [[지구라트]]라 한다.`,
`메소포타미아 문명에서는 점성술과 [[태음력]]이 발달하였다.`,
`메소포타미아 문명에서는 [[60진법]]을 사용하였다.`,
`메소포타미아인은 점토판에 [[쐐기 문자]]로 기록하였다.`,
`바빌로니아 왕국의 전성기를 이끈 왕은 [[함무라비왕]]이다.`,
`함무라비 법전은 보복주의와 신분에 따른 [[차별]]적 적용을 특징으로 한다.`,
`바빌로니아 왕국은 철제 무기를 지닌 [[히타이트]]인에게 멸망하였다.`,
`이집트 문명은 나일강의 주기적 [[범람]]과 비옥한 토지를 바탕으로 발생하였다.`,
`이집트 문명은 [[폐쇄적]] 지형으로 오랜 기간 통일 왕국을 유지하였다.`,
`이집트인은 [[내세적]] 종교관을 발달시켰다.`,
`이집트의 왕인 [[파라오]]는 태양신의 아들로 여겨졌다.`,
`파라오가 정치와 종교를 결합해 다스린 정치를 [[신권 정치]]라 한다.`,
`이집트인은 사후 세계를 중시하여 미라, [[피라미드]], 사자의 서를 제작하였다.`,
`이집트에서는 나일강 범람 시기를 알기 위해 [[태양력]]이 발달하였다.`,
`이집트 문명에서는 [[10진법]]을 사용하였다.`,
`이집트인은 사물의 모양을 본뜬 [[상형 문자]]를 사용하였다.`,
`이집트인은 [[파피루스]]에 문자를 기록하였다.`
]},
{no:"4쪽",title:"인도 문명 · 중국 문명(상)",items:[
`인도 문명은 기원전 2500년경 인더스강 유역의 [[하라파]], 모헨조다로 등지에서 발생하였다.`,
`인도 문명의 도시는 하수 시설과 목욕장 등을 갖춘 [[계획 도시]]였다.`,
`인도 문명은 청동기와 [[그림 문자]]를 사용하였다.`,
`인도 문명은 [[메소포타미아]] 지역과 교역하였다.`,
`기원전 1500년경 중앙아시아에서 인더스강 유역으로 이동한 유목민은 [[아리아인]]이다.`,
`아리아인은 기원전 1000년경 [[갠지스]]강 유역까지 진출하였다.`,
`아리아인은 [[철제]] 농기구와 무기를 사용해 정복 활동을 벌였다.`,
`아리아인이 원주민을 지배하기 위해 만든 엄격한 신분제를 [[카스트제]](바르나)라 한다.`,
`카스트제에서 제사장 계급은 [[브라만]]이다.`,
`카스트제에서 왕족·귀족 계급은 [[크샤트리아]]이다.`,
`카스트제에서 평민 계급은 [[바이샤]]이다.`,
`카스트제에서 하층민 계급은 [[수드라]]이다.`,
`자연 현상을 신격화하고 경전 베다를 완성하며 성립한 종교는 [[브라만교]]이다.`,
`브라만교의 경전은 [[베다]]이다.`,
`중국 문명은 기원전 2500년경 황허강 일대의 비옥한 [[황토]] 지대에서 발생하였다.`,
`기원전 1600년경 세워진, 실제로 확인된 중국 최초의 국가는 [[상]]이다.`,
`상의 수도는 [[은허]]였다.`,
`상에서는 왕이 정치와 제사를 함께 주관하는 [[신권 정치]]가 실시되었다.`,
`상은 [[청동]]으로 무기와 제사용 도구를 제작하였다.`,
`상에서 국가 중대사를 점쳐 결정하고 기록한 문자를 [[갑골문]]이라 한다.`,
`상의 갑골문은 오늘날 [[한자]]의 기원이 되었다.`
]},
{no:"5쪽",title:"중국 문명(주) · 세계 곳곳에서 탄생한 문명",items:[
`기원전 11세기 무렵 상을 무너뜨리고 영토를 확대한 나라는 [[주]]이다.`,
`주가 넓어진 영토를 효율적으로 다스리기 위해 실시한 제도는 [[봉건제]]이다.`,
`봉건제에서 수도 주변 외 지역은 왕족·공신을 [[제후]]로 삼아 다스리게 하였다.`,
`봉건제는 지방을 제후가 다스리는 [[지방 분권]] 체제였다.`,
`주의 봉건제는 왕실과 제후의 [[혈연]] 관계를 바탕으로 하였다.`,
`제후는 주 왕실에 세금·특산물을 바치고 전쟁 시 [[군사]]를 보냈다.`,
`주는 왕실과 제후의 혈연 관계가 [[느슨]]해지며 왕실의 권위가 약화되었다.`,
`기원전 8세기경 [[유목]] 민족의 침입으로 주가 천도하며 급격히 쇠퇴하였다.`,
`기원전 3000년경 지중해 동부 에게해에서 발생한 문명은 [[에게]] 문명이다.`,
`크레타섬에서 청동기와 해상 무역을 바탕으로 발달한 문명은 [[크레타]] 문명이다.`,
`크레타 문명의 대표 유적은 [[크노소스]] 궁전이다.`,
`기원전 2000년경 펠로폰네소스반도에서 발생한 문명은 [[미케네]] 문명이다.`,
`기원전 1200년경 활발한 해상 활동으로 카르타고 등을 건설한 민족은 [[페니키아]]이다.`,
`페니키아의 표음 문자는 오늘날 [[알파벳]]의 기원이 되었다.`,
`유일신 여호와를 믿는 유대교를 창시한 민족은 [[헤브라이]]이다.`,
`유대교는 크리스트교 및 [[이슬람교]] 성립에 영향을 주었다.`,
`카자흐스탄 초원 지대 유목민이 남긴 문화는 [[사카]] 문화이다.`,
`멕시코 남부에서 발생해 마야·아스테카 문명에 영향을 준 문화는 [[올메카]] 문화이다.`,
`올메카 문화는 고무나무와 [[옥수수]]를 재배하였다.`,
`사카 문화의 동물 문양 [[금 공예품]]은 한반도까지 전파되었다.`,
`에게 문명은 고대 [[그리스]] 문화에 영향을 끼쳤다.`
]}
]},
"2-2":{short:"서아시아·지중해",pages:[
{no:"1쪽",title:"고대 서아시아 · 페르시아의 문화와 종교",items:[
`기원전 7세기 무렵 철제 무기와 기마 전술로 서아시아 세계를 최초로 통일한 나라는 [[아시리아]]이다.`,
`아시리아는 정복지에 [[총독]]을 파견하여 중앙 집권 체제를 마련하였다.`,
`아시리아는 피지배 민족에게 [[강압적]] 통치를 실시하였다.`,
`아시리아는 강압적 통치에 대한 [[반발]]로 각지에서 반란이 일어나 멸망하였다.`,
`아시리아 멸망 후 서아시아 세계는 여러 [[국가]]로 분열되었다.`,
`기원전 6세기 키루스 2세가 서아시아를 다시 통일하며 세운 나라는 [[아케메네스 왕조 페르시아]]이다.`,
`아케메네스 왕조 페르시아는 피정복민의 종교·풍습을 존중하는 [[관용]] 정책을 실시하였다.`,
`관용 정책으로 아케메네스 왕조 페르시아는 약 [[200]]년간 통일 왕조를 유지하였다.`,
`아케메네스 왕조 페르시아의 전성기를 이끈 왕은 [[다리우스 1세]]이다.`,
`다리우스 1세는 전국을 20여 개의 주로 나누고 각 지역에 [[총독]]을 파견하였다.`,
`다리우스 1세는 총독을 감독하고자 '[[왕의 눈]]', '왕의 귀'라 불리는 감찰관을 파견하였다.`,
`다리우스 1세는 도로와 역을 설치한 '[[왕의 길]]'을 만들었다.`,
`아케메네스 왕조 페르시아는 [[그리스·페르시아]] 전쟁의 패배로 쇠퇴하였다.`,
`아케메네스 왕조 페르시아는 마케도니아의 [[알렉산드로스]]에게 정복당하였다.`,
`아케메네스 왕조 페르시아에서는 다양한 민족 문화를 존중하며 [[국제적]] 문화가 발달하였다.`,
`'페르시아 도시'라는 의미를 지닌 아케메네스 왕조의 궁전은 [[페르세폴리스]]이다.`,
`조로아스터가 창시한 종교는 [[조로아스터교]]이다.`,
`조로아스터교는 유일신 [[아후라 마즈다]]를 숭배하였다.`,
`조로아스터교는 그 상징인 [[불]]을 신성시하였다.`,
`조로아스터교는 최후의 심판, 천국과 지옥, [[구세주]] 등의 교리를 지녔다.`,
`조로아스터교는 유대교, 크리스트교, [[이슬람교]]에 영향을 주었다.`
]},
{no:"2쪽",title:"폴리스의 형성 · 아테네의 발전",items:[
`중심 도시와 주변 농촌으로 이루어진 그리스의 소규모 도시 국가를 [[폴리스]]라 한다.`,
`폴리스에서 신전과 요새가 있는 높은 지역을 [[아크로폴리스]]라 한다.`,
`폴리스의 광장으로 시민들이 모이는 곳을 [[아고라]]라 한다.`,
`기원전 8세기경 그리스의 대표적 폴리스로는 아테네와 [[스파르타]]가 있다.`,
`폴리스들은 정치적으로 독립했지만 같은 신을 믿고 같은 [[언어]]를 사용하였다.`,
`폴리스들은 4년마다 [[올림피아 제전]]을 열어 유대감을 강화하였다.`,
`민주 정치가 발달하고 델로스 동맹을 주도한 폴리스는 [[아테네]]이다.`,
`정복 국가로 군사 통치를 하고 펠로폰네소스 동맹을 주도한 폴리스는 [[스파르타]]이다.`,
`아테네는 왕정에서 [[귀족정]]으로 변화하였다.`,
`부유해진 [[평민]]이 스스로 무장해 전쟁에 참여하며 지위가 향상되었다.`,
`아테네에서는 [[민회]]를 중심으로 민주 정치가 발달하였다.`,
`재산 정도에 따라 평민의 정치 참여를 정한 금권 정치를 실시한 인물은 [[솔론]]이다.`,
`솔론은 평민을 [[재산]] 정도에 따라 등급을 나누어 정치 참여 권리를 차등 부여하였다.`,
`독재자를 투표로 추방하는 도편 추방제를 실시한 인물은 [[클레이스테네스]]이다.`,
`아테네 민주 정치의 전성기를 이끌고 추첨제·수당제를 실시한 인물은 [[페리클레스]]이다.`,
`페리클레스 시기에는 [[민회]]가 실질적인 입법권을 행사하였다.`,
`아테네에서 국가 중대사 결정에 참여한 사람은 [[20]]세 이상의 남자 시민이었다.`,
`아테네의 직접 민주 정치에서 여자, 노예, [[외국인]]은 정치 참여가 제한되었다.`,
`아테네에서는 관직 대부분을 [[추첨]]으로 뽑았다.`,
`폴리스는 촌락 방어를 위해 [[언덕]]에 성과 요새를 쌓으며 형성되었다.`,
`독재자가 될 가능성이 높은 사람을 일정 기간 추방하는 제도를 [[도편 추방제]]라 한다.`
]},
{no:"3쪽",title:"그리스의 발전과 쇠퇴 · 그리스의 문화",items:[
`기원전 5세기 초 페르시아가 그리스 식민도시를 압박하며 일어난 전쟁은 [[그리스·페르시아 전쟁]]이다.`,
`그리스는 마라톤 전투, [[살라미스]] 해전 등에서 승리하였다.`,
`페르시아의 침입에 대비해 아테네 중심으로 결성된 동맹은 [[델로스 동맹]]이다.`,
`아테네는 델로스 동맹을 주도하며 [[지중해]] 무역을 독차지하였다.`,
`아테네의 세력 확대에 반발해 스파르타 중심으로 결성된 동맹은 [[펠로폰네소스 동맹]]이다.`,
`델로스 동맹과 펠로폰네소스 동맹 사이의 전쟁을 [[펠로폰네소스 전쟁]]이라 한다.`,
`펠로폰네소스 전쟁은 [[스파르타]]의 승리로 끝났다.`,
`그리스는 오랜 전쟁으로 쇠퇴하다 기원전 4세기 [[마케도니아]]에 정복되었다.`,
`그리스 문화는 인간 중심적이고 [[합리적]]인 특징을 지녔다.`,
`신을 인간의 모습으로 표현한 그리스 조각의 예는 [[아테네 여신상]]이다.`,
`조화와 균형의 미를 보여주는 그리스 건축의 대표작은 [[파르테논 신전]]이다.`,
`호메로스는 일리아드와 [[오디세이아]]를 남겼다.`,
`그리스·페르시아 전쟁을 다룬 역사서를 쓴 인물은 [[헤로도토스]]이다.`,
`펠로폰네소스 전쟁을 다룬 역사서를 쓴 인물은 [[투키디데스]]이다.`,
`철학의 대상을 인간·사회로 확대하고 진리의 상대성을 강조한 철학자 집단은 [[소피스트]]이다.`,
`소피스트는 진리의 [[상대성]]을 강조하였다.`,
`객관적·절대적 진리를 주장한 철학자는 [[소크라테스]]이다.`,
`소크라테스의 철학은 플라톤과 [[아리스토텔레스]]에 계승되어 서양 철학의 바탕이 되었다.`,
`그리스 의학에서 활약한 인물은 [[히포크라테스]]이다.`,
`그리스 수학에서 활약한 인물은 [[피타고라스]]이다.`,
`그리스 철학은 [[자연]]에 대한 관심에서 시작되었다.`
]},
{no:"4쪽",title:"알렉산드로스 제국 · 헬레니즘 문화",items:[
`이집트·시리아·아케메네스 왕조 페르시아를 정복하고 인더스강까지 진출한 인물은 [[알렉산드로스]]이다.`,
`알렉산드로스는 유럽·아시아·[[아프리카]]를 잇는 대제국을 건설하였다.`,
`알렉산드로스는 아시아의 [[군주제]]를 계승하였다.`,
`알렉산드로스는 페르시아인을 [[관리]]로 등용하였다.`,
`알렉산드로스는 페르시아인과 그리스인의 [[결혼]]을 장려하였다.`,
`알렉산드로스는 정복지에 그리스식 도시인 [[알렉산드리아]]를 건설하였다.`,
`알렉산드로스 제국의 공용어는 [[그리스어]]였다.`,
`알렉산드로스 사후 제국은 마케도니아, 시리아, [[이집트]]로 분열되었다.`,
`알렉산드로스의 동방 원정으로 그리스 문화가 확산되며 형성된 문화는 [[헬레니즘]] 문화이다.`,
`헬레니즘 문화는 그리스 문화와 [[동방]] 문화가 융합된 것이다.`,
`헬레니즘 시대에는 공동체 의식이 약화되며 [[개인주의]]가 유행하였다.`,
`제국 아래 모두가 같은 시민이라는 사상을 [[세계 시민주의]]라 한다.`,
`욕망을 억제하고 이성적인 삶을 추구한 헬레니즘 철학은 [[스토아학파]]이다.`,
`개인의 행복을 위해 마음의 안정과 만족을 추구한 철학은 [[에피쿠로스학파]]이다.`,
`부력의 원리를 발견한 헬레니즘 과학자는 [[아르키메데스]]이다.`,
`기하학을 정리한 헬레니즘 학자는 [[에우클레이데스]]이다.`,
`지구의 둘레를 계산한 헬레니즘 학자는 [[에라토스테네스]]이다.`,
`헬레니즘 미술은 사실적이고 [[생동감]] 넘치는 미를 중시하였다.`,
`라오콘 군상과 [[밀로의 비너스]]는 헬레니즘 미술의 대표작이다.`,
`헬레니즘 미술은 인체의 [[아름다움]]을 추구하였다.`,
`알렉산드로스의 동방 원정은 동서 [[교류]]를 촉진하였다.`
]},
{no:"5쪽",title:"로마 공화정의 성립과 변화 · 제정",items:[
`기원전 6세기 귀족들이 왕을 몰아내고 수립한 로마의 정치 체제는 [[공화정]]이다.`,
`로마에서 평민의 권리가 확대되며 평민회를 구성하고 [[호민관]]을 선출하였다.`,
`로마 공화정의 최고 의결 기관이자 입법·자문 기구는 [[원로원]]이다.`,
`로마 공화정에서 행정과 군사를 담당한 관직은 [[집정관]]이다.`,
`로마 공화정에서 시민들이 모여 국가 중요사를 결정하는 기구는 [[민회]]이다.`,
`지중해 해상권을 둘러싸고 로마와 카르타고가 벌인 전쟁은 [[포에니 전쟁]]이다.`,
`포에니 전쟁의 승리로 로마는 [[지중해]] 일대를 장악하였다.`,
`귀족들이 노예를 이용해 경영한 대농장을 [[라티푼디움]]이라 한다.`,
`대농장 경영으로 [[자영농]]이 몰락하며 공화정의 위기가 나타났다.`,
`자영농 보호를 위해 개혁을 시도했으나 귀족 반대로 실패한 형제는 [[그라쿠스 형제]]이다.`,
`그라쿠스 형제의 개혁 실패 이후 정권을 장악한 인물은 [[카이사르]]이다.`,
`혼란을 수습하고 원로원으로부터 '아우구스투스' 칭호를 받은 인물은 [[옥타비아누스]]이다.`,
`'아우구스투스'는 '[[존엄한 자]]'라는 의미이다.`,
`제정은 기원전 27년 [[옥타비아누스]]로부터 시작되었다.`,
`옥타비아누스 이후 약 200년간 로마가 누린 전성기를 [[로마의 평화]]라 한다.`,
`3세기 말 제국을 넷으로 나누어 통치한 황제는 [[디오클레티아누스]]이다.`,
`수도를 옮기고 밀라노 칙령으로 크리스트교를 공인한 황제는 [[콘스탄티누스]]이다.`,
`콘스탄티누스가 옮긴 새 수도는 [[콘스탄티노폴리스]]이다.`,
`로마는 4세기 말 동·서 로마로 [[분리]]되었다.`,
`서로마 제국은 476년 [[게르만족]]의 침입으로 멸망하였다.`,
`동로마 제국, 즉 [[비잔티움]] 제국은 이후 1000여 년간 지속되었다.`
]},
{no:"6쪽",title:"로마 문화 · 크리스트교",items:[
`로마에서는 넓은 제국을 다스리기 위해 건축·법률 등 [[실용적]] 문화가 발달하였다.`,
`로마인은 [[콘크리트]]를 건축 재료로 이용하였다.`,
`로마 건축은 아치와 [[돔]]의 원리를 활용하였다.`,
`원형 경기장인 [[콜로세움]]은 로마의 대표 건축물이다.`,
`각 도시를 연결하는 로마의 도로망은 [[아피우스 가도]]이다.`,
`로마법은 관습법에서 시작해 12표법, 시민법, [[만민법]]으로 발전하였다.`,
`로마 최초의 성문법은 [[12표법]]이다.`,
`사회의 규범이 된 불문법을 [[관습법]]이라 한다.`,
`로마 시민에게만 적용된 법은 [[시민법]]이다.`,
`로마 제국 안의 모든 민족에게 적용된 법은 [[만민법]]이다.`,
`유스티니아누스 황제가 로마법을 집대성한 법전은 [[유스티니아누스 법전]]이다.`,
`유스티니아누스 법전은 [[근대법]] 형성에 영향을 주었다.`,
`팔레스타인 지방에서 사랑과 평등을 가르친 인물은 [[예수]]이다.`,
`예수의 가르침을 제자들이 전파하며 창시된 종교는 [[크리스트교]]이다.`,
`크리스트교는 여성, 하층민, [[노예]] 등을 중심으로 로마 제국 전역에 전파되었다.`,
`크리스트교는 유일신 신앙과 [[황제 숭배]] 거부로 박해를 받았다.`,
`밀라노 칙령으로 크리스트교를 공인한 황제는 [[콘스탄티누스]] 대제이다.`,
`밀라노 칙령은 [[313]]년에 발표되었다.`,
`크리스트교를 국교로 선포한 황제는 [[테오도시우스]] 1세이다.`,
`테오도시우스 1세는 [[392]]년 크리스트교를 국교로 선포하였다.`,
`크리스트교는 이후 [[세계적]] 종교로 성장하였다.`
]}
]},
"2-3":{short:"동아시아·인도",pages:[
{no:"1쪽",title:"춘추·전국 시대 · 제자백가",items:[
`기원전 8세기 유목민 침입으로 주 왕실이 [[낙읍]](뤄양)으로 천도하며 춘추·전국 시대가 시작되었다.`,
`천도 이후 주 왕실의 권위가 약화되고 [[제후]]들이 독립된 세력으로 성장하였다.`,
`춘추 시대에는 춘추 [[5패]]의 제후국들이 통솔하였다.`,
`전국 시대에는 강력한 일곱 국가인 전국 [[7웅]]이 패권을 다투었다.`,
`춘추·전국 시대에는 [[철제]] 무기 사용으로 전쟁 규모가 확대되었다.`,
`춘추·전국 시대에 철제 농기구와 [[우경]]으로 농업 생산량이 증대되었다.`,
`농업 발달로 상공업이 성장하며 다양한 [[청동 화폐]]가 사용되었다.`,
`춘추·전국 시대는 정치적으로 혼란기였으나 사회·경제적으로는 [[발전]]기였다.`,
`제후국들이 강하고 부유한 국가를 만들려는 정책을 [[부국강병]]이라 한다.`,
`부국강병을 위해 인재를 등용하며 등장한 여러 학자와 학파를 [[제자백가]]라 한다.`,
`인과 예를 강조한 학파는 [[유가]]이다.`,
`유가의 대표적 학자는 공자와 [[맹자]]이다.`,
`자연의 순리에 따른 삶과 무위자연을 강조한 학파는 [[도가]]이다.`,
`도가의 대표적 학자는 노자와 [[장자]]이다.`,
`도가가 강조한 '자연 그대로의 삶'을 [[무위자연]]이라 한다.`,
`법과 제도의 엄격한 적용을 강조한 학파는 [[법가]]이다.`,
`법가의 대표적 학자는 [[한비자]]이다.`,
`차별 없는 사랑인 겸애를 강조한 학파는 [[묵가]]이다.`,
`묵가의 대표적 학자는 [[묵자]]이다.`,
`묵가가 강조한 '차별 없는 사랑'을 [[겸애]]라 한다.`,
`유가는 [[인]]과 예를 강조하였다.`
]},
{no:"2쪽",title:"진의 중국 통일 · 한의 성립과 발전",items:[
`법가 사상을 바탕으로 기원전 221년 중국을 최초로 통일한 나라는 [[진]]이다.`,
`진은 [[법가]] 사상을 바탕으로 강대국으로 성장하였다.`,
`진의 왕은 칭호를 '[[황제]]'로 바꾸고 자신을 시황제로 칭하였다.`,
`시황제는 전국을 36군으로 나누고 관리를 파견하는 [[군현제]]를 실시하였다.`,
`시황제의 군현제는 직접 관리를 파견해 통치하는 [[중앙 집권]] 체제였다.`,
`시황제는 문자, 화폐, [[도량형]]을 통일하였다.`,
`시황제가 법가 외의 책을 불태우고 학자를 생매장한 사건을 [[분서갱유]]라 한다.`,
`시황제는 흉노를 견제하고자 [[만리장성]]을 축조하였다.`,
`진은 가혹한 통치로 농민 봉기가 일어나 기원전 [[206]]년 멸망하였다.`,
`한을 건국하여 중국을 다시 통일한 인물은 고조, 즉 [[유방]]이다.`,
`한 고조는 군현제와 봉건제를 절충한 [[군국제]]를 실시하였다.`,
`군국제를 전국적 군현제로 바꿔 중앙 집권을 강화한 황제는 한 [[무제]]이다.`,
`한 무제는 동중서의 건의를 받아들여 [[유교]]를 통치 이념으로 삼았다.`,
`한 무제는 흉노와 [[고조선]]을 정복하였다.`,
`한 무제는 재정 악화로 소금과 철을 독점 판매하는 [[전매제]]를 실시하였다.`,
`한 무제는 대월지와의 [[군사 동맹]] 체결을 목적으로 장건을 파견하였다.`,
`한 무제가 흉노 고립을 위해 [[장건]]을 서역에 파견하며 비단길이 개척되었다.`,
`한은 외척이 권력을 장악하자 [[왕망]]이 '신'을 건국하였다.`,
`왕망의 신을 무너뜨리고 후한을 건국한 인물은 [[광무제]]이다.`,
`후한 말 농민 반란인 [[황건적의 난]]이 일어나 한이 멸망하였다.`,
`장건 파견 과정에서 개척된 동서 교역로는 [[비단길]]이다.`
]},
{no:"3쪽",title:"한의 문화 · 고대 유라시아의 동서 교류",items:[
`한대에는 [[유교]]가 통치 이념이 되며 중국 문화의 기틀이 마련되었다.`,
`한 무제는 수도에 유학 교육 기관인 [[태학]]을 설치하였다.`,
`태학에 두어 유학을 가르친 학관을 [[오경박사]]라 한다.`,
`분서갱유로 소실된 유교 경전을 복원하며 발달한 학문은 [[훈고학]]이다.`,
`훈고학은 경전을 해석하고 [[주석]]을 다는 학문이다.`,
`사기를 편찬해 후대 역사 서술의 모범이 된 인물은 [[사마천]]이다.`,
`사마천이 편찬한 역사서는 [[사기]]이다.`,
`제지술을 개량해 학문·사상 발달에 기여한 인물은 [[채륜]]이다.`,
`한대에는 해시계와 [[지진계]]가 발명되었다.`,
`가장 오래된 동서 교역로는 [[초원길]]이다.`,
`유라시아를 오가며 초원길을 개척한 유목 민족은 [[스키타이]]이다.`,
`스키타이의 청동기 문화를 발전시킨 유목 민족은 [[흉노]]이다.`,
`한 무제의 장건 파견으로 개척된 교역로는 [[비단길]]이다.`,
`비단길을 통해 중국의 [[비단]]이 서역으로 전해졌다.`,
`비단길을 통해 서역의 포도, 석류, 호두, [[산호]] 등이 중국으로 전해졌다.`,
`비단길을 통해 인도의 [[불교]]가 중국으로 전해졌다.`,
`기원 전후 이집트 상인이 인도양의 [[계절풍]]을 이용해 해상 교역을 시작하였다.`,
`당·송·몽골 제국에서 크게 발달한 교역로는 [[바닷길]]이다.`,
`초원길·비단길 쇠퇴 이후 동서 교류의 중요한 통로가 된 길은 [[바닷길]]이다.`,
`고대 유라시아의 동서 교류는 초원길, 비단길, [[바닷길]]을 통해 이루어졌다.`,
`한대에 인도에서 전래된 종교는 [[불교]]이다.`
]},
{no:"4쪽",title:"불교의 성립 · 마우리아 왕조",items:[
`기원전 6세기 무렵 불교를 창시한 인물은 고타마 싯다르타, 즉 [[석가모니]]이다.`,
`석가모니는 인도의 [[왕자]] 출신으로 수행 끝에 깨달음을 얻었다.`,
`불교 성립 당시 정치·군사를 담당한 [[크샤트리아]] 세력이 성장하였다.`,
`불교 성립 당시 생산을 담당한 [[바이샤]] 세력이 성장하였다.`,
`크샤트리아와 바이샤는 브라만교와 [[브라만]] 중심의 사회를 비판하였다.`,
`불교는 바르게 수행하면 [[해탈]]의 경지에 도달할 수 있다고 보았다.`,
`불교는 자비와 [[평등]]을 강조하였다.`,
`불교는 브라만교의 권위주의와 [[카스트제]]의 신분 차별을 반대하였다.`,
`불교는 신분 차별에 불만을 품은 크샤트리아와 [[바이샤]] 세력의 지지로 확산되었다.`,
`기원전 4세기 마우리아 왕조를 세우고 최초로 북인도를 통일한 인물은 [[찬드라굽타 마우리아]]이다.`,
`마우리아 왕조의 전성기를 이끈 기원전 3세기 왕은 [[아소카왕]]이다.`,
`아소카왕은 남부 일부를 제외한 인도 [[대부분]]을 통일하였다.`,
`아소카왕은 도로·관개 시설을 정비하고 각 지역에 [[관리]]를 파견하였다.`,
`아소카왕은 통일 과정에서 전쟁의 참상을 목격하고 [[불교]]의 가르침으로 나라를 다스렸다.`,
`아소카왕이 건설한 대표적 탑은 [[산치 대탑]]이다.`,
`아소카왕은 자신의 정책과 불교 가르침을 새긴 [[돌기둥]]을 세웠다.`,
`엄격한 수행으로 개인의 해탈을 강조하는 불교를 [[상좌부 불교]]라 한다.`,
`상좌부 불교는 [[동남아시아]] 여러 지역에 전파되었다.`,
`마우리아 왕조는 아소카왕 사후 쇠퇴하며 인도가 [[재분열]]되었다.`,
`석가모니가 도달할 수 있다고 본 깨달음의 경지를 [[해탈]]이라 한다.`,
`마우리아 왕조를 처음 세운 인물은 [[찬드라굽타 마우리아]]이다.`
]},
{no:"5쪽",title:"쿠샨 왕조의 발전 · 간다라 양식",items:[
`1세기경 이란 계통 유목 민족인 쿠샨족이 세운 왕조는 [[쿠샨 왕조]]이다.`,
`쿠샨 왕조의 전성기를 이끈 2세기의 왕은 [[카니슈카왕]]이다.`,
`쿠샨 왕조는 [[간다라]] 지방을 중심으로 중앙아시아에 이르는 영토를 확보하였다.`,
`쿠샨 왕조는 중국·서아시아·로마를 연결하는 [[중계 무역]]으로 번영하였다.`,
`쿠샨 왕조는 [[마우리아]] 왕조 멸망 후 인도 분열기에 건국되었다.`,
`카니슈카왕은 불경을 정리하고 곳곳에 [[사원]]과 탑을 세웠다.`,
`중생의 구제를 강조하는 불교를 [[대승 불교]]라 한다.`,
`대승 불교는 비단길을 통해 중국·한국·[[일본]] 등 동아시아에 전파되었다.`,
`초기 불교도들은 부처를 보리수, [[수레바퀴]] 등 다양한 상징으로 표현하였다.`,
`알렉산드로스의 동방 원정으로 그리스인이 [[헬레니즘]] 문화를 전파하였다.`,
`부처를 인간의 모습으로 표현한 불상을 제작하며 발달한 양식은 [[간다라 양식]]이다.`,
`간다라 양식은 인도 문화와 [[헬레니즘]] 문화가 융합된 것이다.`,
`간다라 양식에는 그리스의 [[조각]] 기술이 반영되었다.`,
`간다라 불상은 곱슬머리, 오똑한 코, 섬세한 [[옷 주름]] 등을 특징으로 한다.`,
`간다라 양식은 대승 불교와 함께 [[비단길]]을 통해 동아시아로 전파되었다.`,
`상좌부 불교는 개인의 [[해탈]]을 강조한다.`,
`대승 불교는 중생의 [[구제]]를 강조한다.`,
`상좌부 불교는 마우리아 왕조의 [[아소카왕]] 시기에 발달하였다.`,
`대승 불교는 쿠샨 왕조의 [[카니슈카왕]] 시기에 발달하였다.`,
`상좌부 불교는 주로 [[동남아시아]]로 전파되었다.`,
`대승 불교는 주로 [[동아시아]]로 전파되었다.`
]}
]},
"4-1":{short:"유라시아 교역",pages:[
{no:"1쪽",title:"송의 건국과 발전 · 왕안석의 개혁과 남송",items:[
`당 멸망 후 5대 10국의 분열기를 통일한 인물은 조광윤, 즉 송 [[태조]]이다.`,
`송 태조가 세운 나라는 [[송]]이며 수도는 카이펑이었다.`,
`송 태조는 중앙군을 황제 직속으로 개편해 [[절도사]]의 권한을 약화시켰다.`,
`송 태조는 과거 출신의 문인 관료를 우대하는 [[문치주의]]를 실시하였다.`,
`문치주의로 성장한 지배 계층을 [[사대부]]라 한다.`,
`황제가 직접 과거 시험을 주관하는 제도를 [[전시]] 제도라 한다.`,
`전시 제도는 과거 시험의 공정성을 확보하고 [[황제권]]을 강화하였다.`,
`문치주의로 인해 [[군사력]]이 약화되며 북방 민족이 성장하였다.`,
`송은 평화 유지 대가로 막대한 비단과 [[은]]을 바쳐 재정이 악화되었다.`,
`부국강병과 민생 안정을 목적으로 개혁을 실시한 인물은 [[왕안석]]이다.`,
`왕안석 개혁의 목적은 [[부국강병]]과 민생 안정이었다.`,
`왕안석은 농민과 상인에게 낮은 [[이자]]로 돈을 빌려주었다.`,
`왕안석의 개혁은 보수파 관료들의 [[반발]]로 실패하였다.`,
`금에게 화북 지방을 빼앗기고 강남으로 쫓겨나 세워진 나라는 [[남송]]이다.`,
`남송은 [[항저우]](임안)로 천도하였다.`,
`남송은 1127년 [[금]]에게 화북을 빼앗기며 성립하였다.`,
`송에게서 화북 지방을 빼앗은 여진족의 나라는 [[금]]이다.`,
`남송은 비옥한 [[강남]] 지방을 개발하며 경제적 번영을 누렸다.`,
`남송은 [[몽골]]의 침략으로 멸망하였다.`,
`송 태조는 [[황제]]의 군사권을 강화하였다.`,
`송 태조의 문치주의는 절도사 권한 약화와 [[사대부]] 성장으로 이어졌다.`
]},
{no:"2쪽",title:"송의 경제와 해상 교역 · 송의 사회와 문화",items:[
`송대에는 모내기법 보편화와 새로운 [[벼 품종]] 보급으로 농업이 발달하였다.`,
`송대에는 차, [[사탕수수]] 등 상품 작물이 재배되었다.`,
`송대에는 석탄 사용 증가로 제철과 [[자기]] 수공업이 발달하였다.`,
`송대에 동전이 대량 유통되고 지폐인 [[교자]]가 사용되었다.`,
`송대에는 화폐 경제와 [[도시]]·시장이 발달하였다.`,
`송대에 [[나침반]] 사용으로 항해술이 발달하였다.`,
`북방 민족이 비단길·초원길을 장악하자 송은 [[바다]]를 통한 무역이 활발해졌다.`,
`송의 주요 수출품은 도자기, 비단, 서적, [[차]] 등이었다.`,
`송의 국제 무역항으로 항저우와 [[취안저우]]가 성장하였다.`,
`송이 해상 무역을 담당하게 한 관청은 [[시박사]]이다.`,
`시박사는 수속 검사와 [[세금]] 징수, 불법 행위 단속 등을 담당하였다.`,
`문치주의로 성장한 유교적 교양을 갖춘 문관 관료를 [[사대부]]라 한다.`,
`사대부는 가문보다 [[능력]]을 중시하였다.`,
`인간의 본성과 우주의 원리를 탐구하는 철학적 유학을 [[성리학]]이라 한다.`,
`성리학을 집대성한 인물은 남송의 [[주희]]이다.`,
`성리학은 동아시아 여러 국가의 [[통치 이념]]이 되었다.`,
`송대에는 경제 성장을 배경으로 [[서민]] 문화가 발달하였다.`,
`송대에 발달한 서민 문화로 소설과 [[수필]] 등이 유행하였다.`,
`송대에는 화약, 나침반, [[활판 인쇄술]]이 발명되었다.`,
`송의 과학 기술은 이슬람 세계를 거쳐 [[유럽]]까지 전파되었다.`,
`송대에 [[남송]] 시기에는 강남 지방이 활발하게 개발되었다.`
]},
{no:"3쪽",title:"북방 민족의 성장 · 몽골 제국의 성장",items:[
`10세기 초 야율아보기가 세운 나라는 [[거란]](요)이다.`,
`거란을 건국한 인물은 [[야율아보기]]이다.`,
`거란은 발해를 멸망시킨 후 국호를 '[[요]]'로 변경하였다.`,
`11세기 탕구트족이 세운 나라는 [[서하]]이다.`,
`서하는 [[비단길]] 길목에 위치해 중계 무역으로 번성하였다.`,
`12세기 초 아구다가 여진족을 통일해 세운 나라는 [[금]]이다.`,
`금을 건국한 여진족의 인물은 [[아구다]]이다.`,
`금은 송과 연합하여 [[요]]를 멸망시킨 후 송을 공격하였다.`,
`금은 화북 지방을 지배하다 [[몽골]]에게 멸망하였다.`,
`정복 왕조는 한족과 자신들을 다르게 다스리는 [[이원적]] 통치를 실시하였다.`,
`정복 왕조는 자신들의 부족을 [[부족제]]로 통치하였다.`,
`정복 왕조는 한족을 중국식 [[주현제]]로 통치하였다.`,
`정복 왕조는 한족 문화 동화를 막기 위해 고유 [[문자]]를 제작하였다.`,
`13세기 초 몽골고원의 부족을 통합하고 칭기즈 칸으로 추대된 인물은 [[테무친]]이다.`,
`테무친은 1206년 부족장 회의에서 [[칭기즈 칸]]으로 추대되었다.`,
`몽골 제국은 강력한 [[기마 군단]]을 바탕으로 세계 제국을 건설하였다.`,
`교역망의 안전과 확대를 원하던 [[이슬람 상인]]들이 몽골을 지원하였다.`,
`칭기즈 칸은 서하와 [[금]]을 공격하고 중앙아시아로 진출하였다.`,
`칭기즈 칸 사후 몽골은 서아시아의 [[아바스 왕조]]를 멸망시켰다.`,
`칭기즈 칸 사후 몽골 제국은 여러 [[울루스]]로 나뉘었다.`,
`울루스들은 독자적 세력과 영토를 가지며 [[느슨한]] 연합을 유지하였다.`
]},
{no:"4쪽",title:"원의 중국 지배 · 원의 문화와 동서 교류",items:[
`대도(베이징)로 천도하고 국호를 원으로 바꾼 인물은 [[쿠빌라이 칸]]이다.`,
`쿠빌라이 칸은 [[남송]]을 멸망시키고 중국을 통일하였다.`,
`원은 유목민이 중국 전역을 지배한 [[최초]]의 사례였다.`,
`원은 민족 차별 정책인 [[몽골 제일주의]]를 실시하였다.`,
`원에서 주요 관직을 독점한 지배층은 [[몽골인]]이다.`,
`원에서 재정과 실무를 담당한 지배층은 [[색목인]]이다.`,
`금 지배하의 사람들을 [[한인]]이라 하였다.`,
`남송 지배하의 사람들로 가장 심한 차별을 받은 이들은 [[남인]]이다.`,
`원은 황위 계승 분쟁과 [[교초]] 남발로 인한 경제 혼란으로 쇠퇴하였다.`,
`원은 [[홍건적의 난]] 이후 북쪽으로 쫓겨났다.`,
`원대에는 음악·가무·연기가 합쳐진 [[잡극]]이 유행하였다.`,
`몽골 제국이 도로망에 설치한 교통·통신 제도는 [[역참]]제이다.`,
`역참을 이용할 수 있게 한 통행증을 [[패자]]라 한다.`,
`동방견문록을 남겨 동방에 대한 호기심을 키운 인물은 [[마르코 폴로]]이다.`,
`마르코 폴로가 남긴 책은 [[동방견문록]]이다.`,
`여행기를 남겨 아시아·아프리카·유럽을 여행한 인물은 [[이븐 바투타]]이다.`,
`이슬람 역법의 영향을 받아 수시력을 제작한 인물은 [[곽수경]]이다.`,
`곽수경이 제작한 역법은 [[수시력]]이다.`,
`원대에는 이슬람교, 크리스트교, [[티베트 불교]] 등 다양한 종교가 공존하였다.`,
`원의 화약·나침반·인쇄술 등은 [[서아시아]]를 거쳐 유럽에 전해졌다.`,
`원의 국제 무역항으로 항저우와 [[취안저우]]가 발달하였다.`
]}
]},
"4-2":{short:"동아시아·인도 질서",pages:[
{no:"1쪽",title:"명의 건국과 홍무제 · 영락제의 통치와 명의 쇠퇴",items:[
`14세기 중엽 원이 쇠퇴하자 홍건적 출신의 [[주원장]]이 명을 건국하였다.`,
`주원장은 [[난징]]을 수도로 명을 세웠다(1368).`,
`주원장을 가리키는 또 다른 이름은 [[홍무제]]이다.`,
`홍무제는 대도(베이징)를 점령하고 원을 만리장성 북쪽으로 몰아내어 [[한족]] 왕조를 부활시켰다.`,
`홍무제는 유교 이념을 회복하고 [[성리학]]을 관학으로 삼았다.`,
`홍무제는 백성을 교화하기 위해 [[육유]]를 반포하였다.`,
`홍무제는 한족의 전통을 회복하고자 [[몽골식]] 풍습을 금지하였다.`,
`홍무제는 [[재상제]]를 폐지하고 황제가 직접 6부를 장악하였다.`,
`홍무제는 모든 권력을 [[황제]]에게 집중시켰다.`,
`홍무제는 향촌을 효율적으로 통치하기 위해 [[이갑제]]를 실시하였다.`,
`홍무제는 세금 징수를 위해 토지 대장과 [[호적]] 대장을 작성하였다.`,
`자금성을 건설하고 베이징으로 천도한 황제는 [[영락제]]이다.`,
`영락제는 대월(베트남)을 정복하고 [[몽골]]을 공격하는 등 적극적 대외 정책을 펼쳤다.`,
`영락제는 환관인 [[정화]]에게 대규모 항해를 떠나게 하였다.`,
`정화의 함대는 1405년부터 1433년까지 일곱 차례에 걸쳐 [[파견]]되었다.`,
`정화의 함대는 동남아시아, 인도 및 [[아프리카]] 동해안까지 진출하였다.`,
`정화 함대 파견의 목적은 새로운 [[조공국]]을 확보해 명이 세계의 중심임을 드러내기 위함이었다.`,
`정화의 항해 결과 명 중심의 [[조공·책봉]] 질서가 확대되었다.`,
`명은 북쪽의 몽골과 남동 해안의 [[왜구]] 침략으로 쇠퇴하였다.`,
`명은 [[임진왜란]] 출병과 여진족과의 전쟁으로 국가 재정이 악화되었다.`,
`명에서 관료제 개혁과 지출 억제 등을 시도했으나 성과를 거두지 못한 인물은 [[장거정]]이다.`,
`명은 [[이자성]]이 이끄는 농민군에 의해 멸망하였다(1644).`
]},
{no:"2쪽",title:"청의 성립과 발전 · 청의 중국 지배 정책",items:[
`17세기 초 만주에서 누르하치가 [[여진족]]을 통합하여 후금을 건국하였다(1616).`,
`후금을 건국한 인물은 [[누르하치]]이다.`,
`누르하치가 세운 나라의 처음 이름은 [[후금]]이다.`,
`만주족의 군사·행정 조직으로 강력한 군사력의 근간이 된 것은 [[팔기군]]이다.`,
`국호를 '청'으로 바꾸고 몽골과 조선을 침략한 인물은 [[홍타이지]](태종)이다.`,
`홍타이지의 조선 침략을 [[병자호란]]이라 한다.`,
`명이 멸망하자 청은 [[베이징]]을 점령하여 수도로 삼았다(1644).`,
`청은 강희제, 옹정제, [[건륭제]]에 이르는 130여 년간 전성기를 누렸다.`,
`반란 세력을 진압하고 새로운 화이사상을 제시한 황제는 [[강희제]]이다.`,
`군사 기밀 담당 기관을 설치해 황제권을 강화한 황제는 [[옹정제]]이다.`,
`『사고전서』를 편찬해 중국 전통문화를 집대성한 황제는 [[건륭제]]이다.`,
`티베트·신장·몽골을 포함한 최대 영토를 확보한 황제는 [[건륭제]]이다.`,
`청은 소수의 [[만주족]]으로 다수인 한족을 지배하기 위해 강압책과 회유책을 병행하였다.`,
`청이 만주족의 풍속인 [[변발]]과 호복을 한족에게 강요한 것은 강압책에 해당한다.`,
`청은 만주족 비판을 금지하고 한족 중심의 [[중화사상]]을 탄압하였다.`,
`만주족 풍속 강요와 중화사상 탄압은 [[강압책]]에 해당한다.`,
`고위직에 만주족과 한족을 함께 등용하는 정책을 [[만한병용책]]이라 한다.`,
`청은 유학 교육을 장려하고 [[과거제]]를 실시하여 신사층을 포섭하였다.`,
`청이 한족의 유교 문화를 존중하고 과거제를 실시한 것은 [[회유책]]에 해당한다.`,
`청을 건국하여 국호를 정한 인물은 [[홍타이지]](태종)이다.`,
`청의 전성기를 연 세 황제는 강희제, [[옹정제]], 건륭제이다.`,
`건륭제가 확보한 영토는 오늘날 [[중국]] 영토의 대부분에 해당한다.`
]},
{no:"3쪽",title:"명·청대의 경제와 대외 교류 · 사회와 문화",items:[
`명·청대에는 아메리카에서 감자, 고추, [[옥수수]] 등 새로운 작물이 보급되어 생산량이 증가하였다.`,
`명·청대에 창장강 하류에서는 뽕나무, [[면화]] 등 상품 작물을 재배하였다.`,
`명·청대에는 비단, 면직물, [[도자기]] 수공업이 발전하였다.`,
`명·청대 상공업 도시로 쑤저우, [[항저우]] 등이 번영하였다.`,
`명은 왜구의 침략을 막기 위해 대외 무역을 제한하는 [[해금]] 정책을 실시하였다.`,
`청은 [[광저우]] 한 곳만 개방하고 외국 상인에게 공행을 통한 교역만 허용하였다.`,
`청에서 외국과의 교역을 담당한 특허 상인 조직을 [[공행]]이라 한다.`,
`유럽 상인들이 중국 물품 대금으로 [[은]]을 지불하면서 중국에 많은 은이 유입되었다.`,
`은의 대량 유입으로 명·청대에는 세금을 [[은]]으로 거두는 제도가 시행되었다.`,
`「곤여만국전도」를 제작한 이탈리아 선교사는 [[마테오 리치]]이다.`,
`마테오 리치가 제작한 세계 지도는 [[곤여만국전도]]이다.`,
`서양의 천문학과 대포 제작 기술을 전한 선교사는 [[아담 샬]]이다.`,
`명·청대의 지배층으로 전·현직 관료이거나 과거 합격 자격을 갖춘 지식인을 [[신사]]라 한다.`,
`신사는 지방관을 도와 향촌의 사회 안정과 [[질서 유지]]에 중요한 역할을 하였다.`,
`명·청대에 경제 발전으로 서민의 지위가 상승하며 [[서민]] 문화가 발달하였다.`,
`명·청대에 유행한 소설로 『수호전』, 『삼국지연의』, 『[[홍루몽]]』 등이 있다.`,
`노래와 춤이 혼합된 연극으로 청에서 유행한 것은 [[경극]]이다.`,
`이론과 형식에 치우친 성리학을 비판하고 지행합일을 강조한 명의 학문은 [[양명학]]이다.`,
`양명학이 강조한, 올바른 지식과 행동의 일치를 [[지행합일]]이라 한다.`,
`경전을 실증적으로 연구하는 청대의 학문은 [[고증학]]이다.`,
`청대에 정부의 사상 통제로 현실 정치를 멀리하고 발전한 학문은 [[고증학]]이다.`,
`명·청대 농업 발전을 이끈 아메리카 작물에는 감자, 고추, [[옥수수]]가 있다.`
]},
{no:"4쪽",title:"일본의 막부 정권 · 임진왜란과 에도 막부의 통치",items:[
`헤이안 시대 말 귀족·호족들이 토지와 재산을 보호하기 위해 [[무사]]를 고용하면서 무사 세력이 성장하였다.`,
`일본 최초의 막부인 가마쿠라 막부를 세운 인물은 [[미나모토노 요리토모]]이다.`,
`12세기에 성립한 일본 최초의 막부는 [[가마쿠라 막부]]이다.`,
`미나모토노 요리토모는 천황으로부터 [[쇼군]](장군)의 칭호를 받았다.`,
`막부 정권에서 실질적인 지배권을 행사한 것은 [[쇼군]](장군)이었다.`,
`막부 정권에서 [[천황]]은 형식적 지위만 유지하였다.`,
`가마쿠라 막부는 13세기 후반 [[몽골]]의 침략을 막아내는 과정에서 쇠퇴하였다.`,
`명과 조공·책봉 관계를 체결하고 조선과 국교를 맺은 막부는 [[무로마치 막부]]이다.`,
`무로마치 막부는 [[쇼군 계승]] 문제를 둘러싼 갈등으로 쇠퇴하였다.`,
`지방의 다이묘들이 성장하며 약 100년간 세력 다툼이 지속된 시기를 [[전국 시대]]라 한다.`,
`지방의 영주를 일본에서는 [[다이묘]]라 한다.`,
`전국 시대를 통일하고 중국 진출을 명분으로 조선을 침략한 인물은 [[도요토미 히데요시]]이다.`,
`도요토미 히데요시의 조선 침략으로 발발한 전쟁은 [[임진왜란]]이다.`,
`임진왜란으로 조선은 국토가 황폐화되고 [[인구]]가 감소하였다.`,
`임진왜란 결과 명의 국력이 약화되고 만주에서 여진족이 성장해 [[후금]]을 건국하였다.`,
`도요토미 히데요시 정권은 임진왜란 실패 후 [[붕괴]]되었다.`,
`임진왜란 이후 일본에서 도쿠가와 이에야스가 세운 막부는 [[에도 막부]]이다.`,
`에도 막부를 세운 인물은 [[도쿠가와 이에야스]]이다(1603).`,
`지방 다이묘를 일정 기간 에도에 머무르게 하고 가족을 인질로 둔 제도를 [[산킨코타이]] 제도라 한다.`,
`산킨코타이 제도의 목적은 다이묘를 통제하여 [[중앙 집권]]적 봉건제를 유지하는 것이었다.`,
`산킨코타이 제도로 다이묘들이 영지와 에도를 왕래하며 교통로 정비와 [[상업]] 발달이 촉진되었다.`,
`산킨코타이 제도에서 다이묘의 가족은 인질로 [[에도]](도쿄)에 머물렀다.`
]},
{no:"5쪽",title:"에도 막부의 경제·문화·대외 교류 · 무굴 제국의 성립과 발전",items:[
`에도 막부 시기 농업·상공업 발달을 배경으로 성장한 도시 상공업자 계층을 [[조닌]]이라 한다.`,
`에도 막부 시기 조닌이 도시의 [[중산층]]으로 성장하며 조닌 문화가 발달하였다.`,
`에도 막부 시기 조닌 계층이 발전시킨 문화를 [[조닌 문화]]라 한다.`,
`노래, 춤, 연기가 어우러진 서민들의 연극은 [[가부키]]이다.`,
`일상생활 풍경을 판화로 표현한 풍속화를 [[우키요에]]라 한다.`,
`에도 막부는 집권 체제 강화를 위해 [[크리스트교]]를 금지하고 해외 무역을 통제하였다.`,
`에도 막부가 조선과 교류한 사절은 [[통신사]]이다.`,
`에도 막부는 중국과 [[네덜란드]] 상인에게 나가사키를 개항하여 무역을 허락하였다.`,
`에도 막부가 무역을 허락하며 개항한 항구는 [[나가사키]]이다.`,
`네덜란드 상인을 통해 전해진 서양 학문과 기술을 바탕으로 발달한 학문은 [[난학]]이다.`,
`16세기 초 델리를 정복하고 이슬람 왕조인 무굴 제국을 세운 인물은 [[바부르]]이다.`,
`바부르가 세운 제국은 [[무굴 제국]]이다.`,
`굽타 왕조 쇠퇴 후 인도 서북부에 침입한 세력은 [[이슬람]] 세력이다.`,
`관료제를 정비하고 중앙 집권 체제를 강화하며 관용 정책을 실시한 황제는 [[아크바르]] 황제이다.`,
`아크바르 황제는 비이슬람교도에게 부과하던 인두세인 [[지즈야]]를 폐지하였다.`,
`비이슬람교도에게 부과한 인두세를 [[지즈야]]라 한다.`,
`아크바르 황제는 [[힌두교]] 왕비를 맞이하고 고위 관리에 힌두교도를 등용하였다.`,
`인도 남부 대부분을 정복하여 최대 영토를 확보한 황제는 [[아우랑제브]] 황제이다.`,
`이슬람 제일주의 정책으로 지즈야를 부활시키고 다른 종교 사원을 파괴한 황제는 [[아우랑제브]] 황제이다.`,
`아우랑제브 황제의 이슬람 제일주의 정책으로 각지에서 [[반란]]이 발생하였다.`,
`아크바르 황제의 종교적 [[관용]] 정책은 무굴 제국의 안정에 기여하였다.`,
`무굴 제국은 인도 서북부에 침입한 이슬람 세력을 배경으로 [[바부르]]가 건국하였다.`
]},
{no:"6쪽",title:"무굴 제국의 경제와 문화",items:[
`무굴 제국은 상공업 발달과 대외 교역을 바탕으로 [[인도양]] 무역을 주도하였다.`,
`무굴 제국의 농업 발달로 경작지가 확대되고 담배와 [[옥수수]] 등 새로운 작물이 유입되었다.`,
`무굴 제국은 면직물, 견직물, [[향신료]]를 수출하였다.`,
`무굴 제국은 수출 대가로 많은 양의 [[은]]이 유입되어 화폐 경제가 발달하였다.`,
`무굴 제국에서는 힌두 문화와 [[이슬람]] 문화가 융합되어 인도·이슬람 문화가 발달하였다.`,
`무굴 제국의 융합 문화를 [[인도·이슬람]] 문화라 한다.`,
`힌두교와 이슬람교를 절충하여 성립한 종교는 [[시크교]]이다.`,
`시크교는 유일신을 강조하고 [[카스트제]]의 신분 차별을 반대하였다.`,
`시크교는 [[유일신]]을 강조하였다.`,
`무굴 제국의 공용어는 [[페르시아어]]였다.`,
`힌디어에 페르시아어와 아랍어가 합쳐져 일상에서 사용된 언어는 [[우르두어]]이다.`,
`무굴 제국의 일상 언어인 우르두어는 힌디어, 페르시아어, [[아랍어]]가 합쳐진 것이다.`,
`인도와 이슬람 양식이 조화를 이룬 대표적 건축물은 [[타지마할]]이다.`,
`타지마할은 [[인도·이슬람]] 양식의 대표적 건축물이다.`,
`연꽃무늬, 격자무늬 창, 작은 탑은 [[인도]] 양식의 특징이다.`,
`돔형 지붕, 뾰족한 아치, 벽면의 『쿠란』 구절은 [[이슬람]] 양식의 특징이다.`,
`무굴 제국 건축의 이슬람 양식에는 벽면에 『[[쿠란]]』 구절을 새겼다.`,
`무굴 제국에서 화폐 경제가 발달한 것은 많은 양의 [[은]]이 유입되었기 때문이다.`,
`무굴 제국의 새로운 작물로는 담배와 [[옥수수]]가 있다.`,
`무굴 제국의 주요 수출품에는 면직물, 견직물, [[향신료]]가 있다.`,
`타지마할에는 인도 양식인 연꽃무늬와 이슬람 양식인 [[돔형 지붕]]이 함께 나타난다.`
]}
]},
"4-3":{short:"서아시아·유럽",pages:[
{no:"1쪽",title:"서아시아의 이슬람 왕조 · 오스만 제국의 발전",items:[
`11세기 중반 중앙아시아의 유목 민족으로 성장하여 바그다드를 점령한 세력은 [[셀주크 튀르크]]이다.`,
`셀주크 튀르크는 아바스 왕조의 수도인 [[바그다드]]를 점령하였다.`,
`셀주크 튀르크는 칼리프로부터 '[[술탄]]' 칭호를 얻어 이슬람 세계의 실질적 지배자가 되었다.`,
`셀주크 튀르크가 [[예루살렘]]을 점령하고 비잔티움 제국을 압박하면서 십자군 전쟁이 일어났다.`,
`셀주크 튀르크의 예루살렘 점령과 비잔티움 압박으로 발생한 전쟁은 [[십자군 전쟁]]이다.`,
`14세기 후반 칭기즈 칸의 후예를 자처하며 몽골 제국의 부흥을 내세워 건국한 인물은 [[티무르]]이다.`,
`티무르가 세운 왕조는 [[티무르 왕조]]이다(1370).`,
`티무르 왕조의 수도로 동서 교역로에 위치해 중계 무역으로 번영한 도시는 [[사마르칸트]]이다.`,
`1501년 페르시아 제국의 계승을 내세우며 사파비 왕조를 건국한 인물은 [[이스마일 1세]]이다.`,
`이스마일 1세가 세운 왕조는 [[사파비 왕조]]이다.`,
`관료 조직과 상비군을 정비하고 오스만 제국을 물리친 사파비 왕조의 왕은 [[아바스 1세]]이다.`,
`사파비 왕조는 고대 페르시아 왕의 칭호인 '[[샤]]'를 사용하였다.`,
`사파비 왕조는 [[시아파]] 이슬람교를 국교로 하여 페르시아의 전통을 계승하였다.`,
`사파비 왕조의 수도로 동서 중계 무역의 중심지가 된 세계 도시는 [[이스파한]]이다.`,
`13세기 말 소아시아 지역에서 오스만 튀르크가 성장하여 세운 나라는 [[오스만 제국]]이다(1299).`,
`오스만 제국은 발칸반도 대부분을 장악하고 [[술탄]] 칭호를 사용하였다.`,
`비잔티움 제국을 정복하고 콘스탄티노폴리스를 이스탄불로 고쳐 수도로 삼은 술탄은 [[메흐메트 2세]]이다.`,
`메흐메트 2세가 콘스탄티노폴리스를 고쳐 부른 이름은 [[이스탄불]]이다.`,
`오스만 제국의 술탄은 종교적 지도자인 [[칼리프]] 칭호까지 얻어 술탄·칼리프로 불렸다.`,
`오스만 제국에서 정치·종교를 아우르는 지배 체제를 [[술탄·칼리프제]]라 한다.`,
`헝가리를 정복하고 오스트리아 수도 빈을 공격하며 전성기를 이끈 술탄은 [[술레이만 1세]]이다.`,
`술레이만 1세는 유럽 연합 함대를 격파하여 [[지중해]] 해상권을 장악하였다.`
]},
{no:"2쪽",title:"오스만 제국의 사회와 경제 · 문화",items:[
`오스만 제국은 넓은 영토와 다양한 종교를 효율적으로 통치하기 위해 [[관용]] 정책을 실시하였다.`,
`오스만 제국은 민족·출신에 상관없이 [[능력]]에 따라 관리를 등용하였다.`,
`이슬람교도가 아닌 이들이 지즈야를 내면 결성할 수 있었던 자치적 공동체를 [[밀레트]]라 한다.`,
`오스만 제국의 자치적 종교 공동체 제도를 [[밀레트 제도]]라 한다.`,
`밀레트 제도에서 비이슬람교도는 종교의 자유와 [[자치]]를 누렸다.`,
`비이슬람교도가 자치를 누리기 위해 내야 했던 인두세는 [[지즈야]]이다.`,
`정복지의 크리스트교 소년 중 인재를 선발해 편성한 술탄의 친위 부대는 [[예니체리]]이다.`,
`예니체리는 정복지의 크리스트교 소년을 [[이슬람교]]로 개종시켜 편성하였다.`,
`오스만 제국은 [[동서 교역로]]를 장악하여 경제적 번영을 누렸다.`,
`오스만 제국의 수도로 아시아와 유럽을 잇는 길목에서 국제적 도시로 성장한 곳은 [[이스탄불]]이다.`,
`오스만 제국의 시장으로 각국 상인이 활동한 곳을 [[바자르]]라 한다.`,
`오스만 제국의 바자르에는 커피, [[담배]]를 비롯한 세계 여러 지역의 산물이 유입되었다.`,
`오스만 제국의 문화는 튀르크 전통에 비잔티움, 이슬람, [[페르시아]] 문화가 융합된 것이다.`,
`비잔티움 양식이 혼합된 오스만 제국의 이슬람 사원을 [[모스크]]라 한다.`,
`술탄 아흐메트 사원은 [[블루 모스크]]라고도 불린다.`,
`오스만 제국이 네 개의 첨탑을 세우고 이슬람 사원으로 사용한 비잔티움 건축물은 [[성 소피아 대성당]]이다.`,
`페르시아 전통을 이어받아 오스만 제국에서 발달한 그림은 [[세밀화]]이다.`,
`오스만 제국에서 발달한, 식물 덩굴 등을 기하학적으로 표현한 무늬를 [[아라베스크]] 무늬라 한다.`,
`오스만 제국에서는 천문학, 수학, [[지리학]] 등 실용적 학문이 발달하였다.`,
`오스만 제국에서 인기를 끈 인형극은 [[그림자 인형극]]이다.`,
`오스만 제국의 바자르를 중심으로 널리 퍼진 음료 문화는 [[커피]] 문화이다.`,
`오스만 제국에서 능력에 따라 관리를 등용한 것은 [[관용]] 정책의 일환이었다.`
]},
{no:"3쪽",title:"신항로 개척의 배경과 전개 · 결과 및 영향",items:[
`유럽인의 동방에 대한 호기심을 자극한 마르코 폴로의 책은 『[[동방견문록]]』이다.`,
`십자군 전쟁 이후 향신료, 비단, 도자기 등 [[동방]] 상품에 대한 수요가 증가하였다.`,
`동방 무역을 독점한 것은 이슬람 상인과 [[이탈리아]] 상인이었다.`,
`원거리 항해에 대한 자신감을 높인 항해술 발달의 대표 도구는 [[나침반]]이다.`,
`신항로 개척의 배경에는 지리학, 천문학 및 [[조선술]]의 발달이 있었다.`,
`대서양 연안에 위치해 신항로 개척을 주도한 두 나라는 포르투갈과 [[에스파냐]]이다.`,
`아프리카 남쪽 끝의 희망봉에 도착한 인물은 [[바르톨로메우 디아스]]이다.`,
`아프리카 남쪽 끝의 곶을 [[희망봉]]이라 한다.`,
`희망봉을 돌아 인도 항로를 개척한 인물은 [[바스쿠 다가마]]이다.`,
`에스파냐의 후원으로 대서양을 횡단하여 아메리카 대륙에 도착한 인물은 [[콜럼버스]]이다.`,
`콜럼버스가 도착한 서인도 제도는 오늘날 [[아메리카]] 대륙에 해당한다.`,
`최초로 세계 일주에 성공한 인물은 [[마젤란]]이다.`,
`신항로 개척으로 무역의 중심지가 지중해에서 [[대서양]]으로 이동하였다.`,
`대서양 연안 국가인 포르투갈, 에스파냐, [[영국]] 등이 번영하였다.`,
`유럽, 아프리카, 아메리카 세 대륙을 연결하는 무역 형태를 [[삼각 무역]]이라 한다.`,
`삼각 무역에서 유럽은 면직물과 무기를 아프리카의 [[흑인 노예]]와 교환하였다.`,
`신항로 개척으로 아메리카에서 유럽으로 감자, 옥수수, [[담배]] 등이 전해졌다.`,
`아메리카에서 막대한 금·은이 유입되며 유럽의 물가가 크게 상승한 현상을 [[가격 혁명]]이라 한다.`,
`금·은 유입으로 상공업이 성장하고 자본주의의 바탕이 마련된 변화를 [[상업 혁명]]이라 한다.`,
`가격 혁명과 상업 혁명은 유럽 [[자본주의]] 발달의 바탕이 되었다.`,
`유럽 국가들이 아시아로 진출하기 위해 세운 회사는 [[동인도 회사]]이다.`,
`유럽 국가들은 아시아 교역에서 상품 대금을 [[은]]으로 지급하였다.`
]},
{no:"4쪽",title:"아메리카와 아프리카의 변화 · 종교 개혁과 종교 전쟁",items:[
`멕시코고원에서 발달하고 수도가 테노치티틀란이었던 문명은 [[아스테카 문명]]이다.`,
`아스테카 문명의 수도는 [[테노치티틀란]]이다.`,
`아스테카 문명은 에스파냐의 [[코르테스]]에 의해 정복되었다.`,
`안데스고원에서 성장하고 수도가 쿠스코였던 문명은 [[잉카 문명]]이다.`,
`잉카 문명의 수도는 [[쿠스코]]이다.`,
`잉카 문명은 계단식 밭에 감자, [[옥수수]] 등을 재배하였다.`,
`잉카 문명은 에스파냐의 [[피사로]]에 의해 정복되었다.`,
`신항로 개척 이후 천연두·홍역 등 전염병 유입으로 아메리카 원주민 인구가 [[급감]]하였다.`,
`정복 이후 아메리카 원주민은 대농장과 [[광산]]에서 가혹한 노동에 시달렸다.`,
`아메리카 원주민이 감소하자 아프리카 흑인을 끌고 가 노동에 동원한 무역을 [[노예 무역]]이라 한다.`,
`노예 무역으로 아프리카는 인구가 감소하고 남녀 [[성 비율]]의 불균형이 나타났다.`,
`교황이 성 베드로 성당 증축 비용 마련을 위해 판매한 것은 [[면벌부]]이다.`,
`'95개조 반박문'을 발표하여 면벌부 판매를 비판한 인물은 [[루터]]이다.`,
`루터는 인간의 구원이 신앙에 의해서만 가능하며 신앙의 근거는 '[[성서]]'임을 강조하였다.`,
`1555년 루터파를 공식적으로 인정한 화의는 [[아우크스부르크 화의]]이다.`,
`스위스에서 인간의 구원 여부가 미리 정해져 있다는 예정설을 주장한 인물은 [[칼뱅]]이다.`,
`칼뱅이 주장한, 인간의 구원 여부가 신에 의해 미리 정해졌다는 설은 [[예정설]]이다.`,
`칼뱅은 [[이윤 추구]]를 정당화하여 상공업자의 지지를 얻었다.`,
`국왕의 이혼 문제를 계기로 국왕이 교회의 수장임을 선언하며 성립한 교회는 [[영국 국교회]]이다.`,
`신교와 구교의 대립으로 독일에서 일어난 종교 전쟁은 [[30년 전쟁]]이다.`,
`30년 전쟁을 끝내며 칼뱅파를 인정한 조약은 [[베스트팔렌 조약]]이다.`,
`종교 개혁으로 크리스트교 세계는 로마 가톨릭교회(구교)와 [[신교]]로 나뉘었다.`
]},
{no:"5쪽",title:"재정·군사 국가 · 여러 나라의 재정·군사 국가",items:[
`16세기 후반 이후 강한 군사력과 효율적 징세 제도를 갖춘 중앙 집권적 통일 국가를 [[재정·군사 국가]]라 한다.`,
`재정·군사 국가는 화약 무기와 대규모 [[보병]] 조직을 기반으로 상비군을 양성하였다.`,
`방대한 군사 조직을 운영할 재정 확보를 위해 양성한 상설 군대를 [[상비군]]이라 한다.`,
`재정·군사 국가는 별 모양의 [[성채]]를 기반으로 하였다.`,
`재정·군사 국가는 세금을 효율적으로 걷기 위해 행정 기구와 [[관료제]]를 정비하였다.`,
`상공시민층을 보호하고 수출을 늘려 금·은을 확보하려는 경제 정책을 [[중상주의]]라 한다.`,
`중상주의는 수입을 [[제한]]하고 수출을 늘려 금과 은을 확보하는 정책이다.`,
`중상주의 국가는 넓은 시장과 원료 공급을 위해 [[식민지]]를 확보하였다.`,
`아메리카에서 유입된 금·은으로 무적함대를 육성한 에스파냐의 왕은 [[펠리페 2세]]이다.`,
`펠리페 2세가 지중해 무역 장악을 위해 육성한 함대는 [[무적함대]]이다.`,
`대서양 무역으로 상공업이 발달하고 베스트팔렌 조약으로 독립한 나라는 [[네덜란드]]이다.`,
`네덜란드는 [[동인도 회사]]를 통해 부를 축적하였다.`,
`네덜란드 총독은 의회를 통해 시민들의 의견을 수용하고 [[상공업자]]로부터 효율적으로 세금을 거두었다.`,
`'태양왕'이라 불리며 절대주의를 추구한 프랑스의 왕은 [[루이 14세]]이다.`,
`왕의 권리는 신에게서 받은 절대적인 것이라는 사상을 [[왕권신수설]]이라 한다.`,
`루이 14세는 의회를 소집하지 않은 채 왕의 신성한 권리를 내세우는 [[절대주의]]를 추구하였다.`,
`루이 14세가 등용하여 중상주의를 추진한 재무 장관은 [[콜베르]]이다.`,
`루이 14세가 자신의 권력을 과시하기 위해 세운 궁전은 [[베르사유 궁전]]이다.`,
`오스트리아와의 전쟁에서 승리하며 영토를 확장하고 계몽주의적 개혁을 추진한 나라는 [[프로이센]]이다.`,
`프로이센에서 계몽주의 개혁을 추진한 왕은 [[프리드리히 2세]]이다.`,
`프리드리히 2세가 건설한 궁전은 [[상수시 궁전]]이다.`,
`프로이센은 프랑스를 본보기 삼아 [[절대주의]]를 추구하였다.`
]},
{no:"6쪽",title:"영국 혁명 · 17~18세기의 문화",items:[
`의회를 존중하여 정치적 안정을 이루고 강력한 함대로 해상 무역을 장악한 영국의 왕은 [[엘리자베스 1세]]이다.`,
`엘리자베스 1세는 북아메리카에 식민지를 건설하고 [[동인도 회사]]를 통해 아시아로 진출하였다.`,
`청교도 혁명의 배경은 [[찰스 1세]]의 절대주의 추구였다.`,
`찰스 1세가 의회의 동의 없이 세금을 걷자 의회가 제출한 문서는 [[권리 청원]]이다.`,
`청교도 혁명에서 의회파를 이끌어 승리한 인물은 [[크롬웰]]이다.`,
`청교도 혁명의 결과 찰스 1세가 처형되고 [[공화정]]이 수립되었다.`,
`크롬웰은 의회를 해산하고 [[독재]] 정치를 실시하였으며 사후 왕정복고가 이루어졌다.`,
`명예혁명의 배경은 찰스 2세의 뒤를 이은 [[제임스 2세]]의 전제 정치였다.`,
`의회가 제임스 2세를 폐위하고 메리와 [[윌리엄]]을 공동 왕으로 추대한 사건을 명예혁명이라 한다.`,
`제임스 2세를 폐위하고 메리와 윌리엄을 추대한 무혈 혁명을 [[명예혁명]]이라 한다.`,
`명예혁명으로 의회가 승인받은 문서는 [[권리 장전]]이다.`,
`명예혁명으로 영국은 [[입헌 군주제]]의 토대를 마련하였다.`,
`영국은 왕과 의회의 협력을 바탕으로 강력한 [[재정·군사 국가]]로 발전하였다.`,
`우주의 모든 물체가 서로 끌어당긴다는 만유인력의 법칙을 발견한 인물은 [[뉴턴]]이다.`,
`뉴턴이 발견한, 우주 속 모든 물체에 서로 끌어당기는 힘이 있다는 법칙은 [[만유인력의 법칙]]이다.`,
`사회가 사람들의 계약을 통해 만들어졌다는 사회 계약설을 주장한 인물은 [[로크]]이다.`,
`로크가 주장한, 사회가 사람들의 계약으로 만들어졌다는 사상은 [[사회 계약설]]이다.`,
`인간의 이성이 사회를 진보하게 한다고 믿으며 18세기에 등장한 사상은 [[계몽사상]]이다.`,
`국가 권력을 입법, 사법, 행정으로 나누어야 한다고 주장한 계몽사상가는 [[몽테스키외]]이다.`,
`대표적 계몽사상가로 볼테르, 몽테스키외, [[루소]] 등이 있다.`,
`로크의 사회 계약설은 미국 혁명과 [[프랑스 혁명]]에 영향을 주었다.`,
`계몽사상은 미국 혁명과 [[프랑스 혁명]]의 사상적 기반이 되었다.`
]}
]},
"3-1":{short:"동아시아 문화",pages:[
{no:"1쪽",title:"위·진·남북조 시대 · 사회와 문화",items:[
`후한 멸망 후 3세기경 중국은 위·촉·[[오]]의 삼국으로 분열되었다.`,
`삼국 중 위를 계승한 [[진]](晉)이 중국을 통일하였다(280).`,
`유목 민족이 화북 지방 곳곳에 국가를 세운 시기를 [[5호 16국]] 시대라 한다.`,
`화북에서 진이 쫓겨난 뒤 한족이 강남으로 이동하여 세운 나라는 [[동진]]이다.`,
`남북조 시대에 화북 지방을 통일한, 선비족이 세운 나라는 [[북위]]이다.`,
`한족의 제도와 문물을 적극 수용한 북위 효문제의 정책을 [[한화 정책]]이라 한다.`,
`효문제는 선비족과 한족의 [[결혼]]을 장려하였다.`,
`효문제는 선비족의 언어와 [[의복]]을 금지하고 한족의 성씨를 사용하게 하였다.`,
`북위 효문제의 한화 정책으로 유목 민족 문화와 [[한족]] 문화가 융합되었다.`,
`남조에서는 이주해 온 한족에 의해 [[벼농사]]가 보급되며 강남 지방이 개발되었다.`,
`강남 개발로 강남의 [[경제력]]이 향상되었다.`,
`추천으로 관리를 선발하는 제도를 [[9품중정제]]라 한다.`,
`9품중정제로 호족이 중앙 정부로 진출해 관직을 독점하며 [[문벌 귀족]]으로 성장하였다.`,
`혼란한 사회에서 벗어나 개인의 자유로운 삶을 추구한 사상은 [[청담 사상]]이다.`,
`청담 사상의 대표적 인물들을 [[죽림칠현]]이라 한다.`,
`남조의 시인으로 「귀거래사」를 지은 인물은 [[도연명]]이다.`,
`「여사잠도」를 그린 남조의 화가는 [[고개지]]이다.`,
`남조의 대표적 서예가는 [[왕희지]]이다.`,
`남북조 시대에 왕실과 귀족의 지원으로 발달한 종교는 [[불교]]이다.`,
`남북조 시대에 조성된 대규모 석굴 사원으로 윈강, [[룽먼]] 석굴이 있다.`,
`노장 사상과 신선 사상(불로장생), 민간 신앙이 결합하여 발전한 종교는 [[도교]]이다.`,
`불교는 [[한대]]에 처음 전래되어 남북조 시대에 크게 발달하였다.`
]},
{no:"2쪽",title:"수의 중국 통일 · 당의 건국과 발전",items:[
`589년 남북조로 나뉜 중국을 다시 통일한 나라는 [[수]]이다.`,
`수를 세워 중국을 통일한 황제는 [[문제]]이다.`,
`수 문제는 중앙 집권 체제 강화를 위해 [[3성 6부제]]를 도입하였다.`,
`수 문제는 능력에 따라 인재를 등용하는 [[과거제]]를 실시하였다.`,
`수 문제의 과거제 실시 목적은 문벌 귀족의 관직 독점을 막고 [[왕권]]을 강화하는 것이었다.`,
`화북 지방과 강남 지방을 연결하기 위해 대운하를 건설한 황제는 [[양제]]이다.`,
`수 양제가 건설한, 화북과 강남을 잇는 대규모 수로는 [[대운하]]이다.`,
`대운하로 강남의 풍족한 물자가 [[화북]] 지방에 공급되었다.`,
`수는 대규모 토목 공사와 [[고구려]] 원정 실패로 반란이 일어나 멸망하였다(618).`,
`수 멸망 후 혼란을 수습하며 당을 건국한 인물은 당 고조, 즉 [[이연]]이다.`,
`당의 수도는 [[장안]]이었다.`,
`율령 체제를 완성하고 동돌궐을 정벌한 당의 황제는 당 [[태종]]이다.`,
`당 태종은 동돌궐을 정벌하고 중앙아시아로 진출하여 [[동서 교역로]]를 장악하였다.`,
`신라와 연합하여 백제와 고구려를 멸망시킨 당의 황제는 당 [[고종]]이다.`,
`당의 중앙 행정 조직으로 중앙 집권 체제를 강화한 제도는 [[3성 6부제]]이다.`,
`성인 남성에게 일정한 토지를 지급해 농민 생활을 안정시킨 제도는 [[균전제]]이다.`,
`토지를 받은 농민에게 곡물·노동력·직물을 징수한 제도는 [[조·용·조]]이다.`,
`토지를 받은 농민이 군사 훈련을 받고 군사적 의무를 지는 제도는 [[부병제]]이다.`,
`균전제, 조·용·조, 부병제를 포괄하는 당의 통치 체제를 [[율령 체제]]라 한다.`,
`8세기 중반 절도사가 일으켜 당의 쇠퇴를 가져온 난은 [[안사의 난]]이다.`,
`875년 일어난 농민 반란으로 당이 더욱 쇠퇴한 사건은 [[황소의 난]]이다.`,
`당은 결국 907년 [[절도사]] 세력에게 멸망하였다.`
]},
{no:"3쪽",title:"당의 문화 · 만주와 한반도의 고대 국가",items:[
`당에서는 시, 회화, 서예 등 [[귀족]] 중심의 문화가 발달하였다.`,
`당의 대표적 시인으로 이백과 [[두보]]가 있다.`,
`당의 회화에서 활약한 인물은 [[왕유]]이다.`,
`당의 서예에서 활약한 인물은 [[구양순]]이다.`,
`당의 수도 [[장안]]에는 여러 나라의 사신과 유학생, 승려가 모여들었다.`,
`당에는 조로아스터교, 경교, 이슬람교, [[마니교]] 등 다양한 종교가 전래되었다.`,
`흰색·녹색·갈색 세 가지 유약을 써서 만든 화려한 당의 도자기는 [[당삼채]]이다.`,
`당삼채는 당 문화의 귀족적·[[국제적]] 특징을 보여준다.`,
`훈고학을 집대성하여 유교 경전 해석을 통일한 책은 『[[오경정의]]』이다.`,
`『오경정의』는 [[과거 시험]]의 기준이 되었다.`,
`인도에서 불경을 가져와 번역한 당의 승려는 [[현장]]이다.`,
`당에서 왕실의 지원으로 발달하여 사원이 건립된 종교는 [[도교]]이다.`,
`만주와 한반도에 세워진 최초의 국가는 [[고조선]]이다.`,
`고조선은 [[청동기]] 문화를 기반으로 건국되었다.`,
`고조선은 한 무제의 침략으로 [[멸망]]하였다.`,
`고조선 멸망 후 등장한 여러 나라가 통합되어 고구려, 백제, [[신라]]의 삼국 시대가 전개되었다.`,
`삼국은 중국의 율령, 불교, [[유교]]를 수용하며 중앙 집권 국가로 발전하였다.`,
`삼국의 문물은 [[일본]] 고대 국가 형성에 영향을 주었다.`,
`7세기 무렵 당과 동맹한 [[신라]]가 백제·고구려를 멸망시키고 삼국을 통일하였다.`,
`고구려 유민이 세운 나라는 [[발해]]이다.`,
`남쪽의 신라와 북쪽의 발해가 발전한 시기를 [[남북국 시대]]라 한다.`,
`발해는 한때 당과 대립했으나 점차 당의 [[문물]]을 받아들이며 교류하였다.`
]},
{no:"4쪽",title:"일본의 고대 국가 · 동아시아 문화권",items:[
`중국과 한반도로부터 벼농사와 청동기·철기 문화를 수용한 일본의 문화는 [[야요이]] 문화이다.`,
`4세기경 한반도와 중국의 선진 문화를 수용하며 성장한 일본의 정권은 [[야마토 정권]]이다.`,
`야마토 정권이 발전시킨, 유교와 불교가 발달한 문화는 [[아스카]] 문화이다.`,
`645년 당의 율령 체제를 받아들여 국왕 중심의 중앙 집권 체제를 확립한 개혁은 [[다이카 개신]]이다.`,
`일본은 7세기 말부터 '[[천황]]' 칭호와 '일본' 국호를 사용하기 시작하였다.`,
`8세기 초 당의 장안성을 본떠 헤이조쿄(나라)로 천도한 시기를 [[나라 시대]]라 한다.`,
`나라 시대에 불교 문화가 발달하며 건립된 대표 사원은 [[도다이사]]이다.`,
`나라 시대에 당의 문물을 수용하기 위해 파견한 사절은 [[견당사]]이다.`,
`나라 시대에 신라의 문물을 수용하기 위해 파견한 사절은 [[견신라사]]이다.`,
`794년 헤이안쿄(교토)로 천도한 이후의 시기를 [[헤이안 시대]]라 한다.`,
`헤이안쿄의 오늘날 지명은 [[교토]]이다.`,
`헤이안 시대에 귀족·호족·사원이 대토지를 소유한 [[장원]]이 발달하였다.`,
`장원의 발달로 중앙 집권 체제가 붕괴되고 [[천황]] 세력이 약화되었다.`,
`헤이안 시대에 귀족이 자신의 토지를 지키기 위해 [[무사]]를 고용하며 무사 세력이 성장하였다.`,
`외래문화를 일본인의 특성에 맞게 변형시킨, 헤이안 시대의 독자적 문화는 [[국풍 문화]]이다.`,
`국풍 문화 시기에 일본 고유의 문자인 [[가나]] 문자가 만들어졌다.`,
`당의 개방적 대외 정책으로 형성된, 한국·베트남·일본 등의 문화권은 [[동아시아 문화권]]이다.`,
`동아시아 국가들의 의사소통 수단이 되었으며 이두·가나·쯔놈 문자에 영향을 준 것은 [[한자]]이다.`,
`베트남에서 한자의 영향으로 만들어진 문자는 [[쯔놈]] 문자이다.`,
`왕권 강화와 중앙 집권 체제 정비에 기여한 동아시아 공통 요소는 [[율령]]이다.`,
`국가 통치 이념이자 사회 규범으로 공자를 모시는 문묘를 세우게 한 요소는 [[유교]]이다.`,
`동아시아 문화권의 공통 문화 요소는 한자, 율령, 불교, [[유교]]이다.`
]}
]},
"3-2":{short:"세계 종교 확산",pages:[
{no:"1쪽",title:"사산 왕조 페르시아 · 사산 왕조 페르시아의 문화",items:[
`3세기 초 아케메네스 왕조 페르시아의 부흥을 내걸고 건국된 나라는 [[사산 왕조 페르시아]]이다.`,
`사산 왕조 페르시아의 수도는 [[크테시폰]]이다.`,
`사산 왕조 페르시아는 [[파르티아]]를 멸망시키고 성장하였다.`,
`사산 왕조 페르시아는 서쪽으로 [[로마 제국]], 동쪽으로 쿠샨 왕조와 대립하였다.`,
`사산 왕조 페르시아는 메소포타미아 지역에서 [[인더스강]] 유역에 이르는 대제국을 건설하였다.`,
`사산 왕조 페르시아는 지방에 [[총독]]을 파견하여 중앙 집권 체제를 확립하였다.`,
`사산 왕조 페르시아의 공용어는 [[페르시아어]]였다.`,
`사산 왕조 페르시아는 동서 교역 요충지를 장악하여 [[중계 무역]]을 주도하였다.`,
`사산 왕조 페르시아는 비잔티움 제국과의 오랜 전쟁과 지배층 [[내분]]으로 쇠퇴하였다.`,
`사산 왕조 페르시아는 7세기 중엽 [[이슬람]] 세력에 의해 멸망하였다(651).`,
`사산 왕조 페르시아의 활발한 대외 교류로 [[국제적]] 문화가 발달하였다.`,
`사산 왕조 페르시아의 금·은·유리 공예 기술은 비단길과 [[초원길]]을 통해 전파되었다.`,
`사산 왕조 페르시아의 공예품은 유럽, 이슬람, [[동아시아]] 지역까지 전파되었다.`,
`선의 신 아후라 마즈다와 악의 신 [[아리만]]의 대결로 세상을 본 종교는 조로아스터교이다.`,
`조로아스터교에서 선(빛)의 신은 [[아후라 마즈다]]이다.`,
`조로아스터교는 선과 악의 대결, 최후의 심판, 천국과 지옥, [[구세주]]의 출현 등을 가르쳤다.`,
`조로아스터교는 유대교, 크리스트교, [[이슬람교]] 등에 영향을 끼쳤다.`,
`사산 왕조 페르시아는 [[조로아스터교]]를 국교로 삼았다.`,
`조로아스터교의 경전으로 집대성된 것은 『[[아베스타]]』이다.`,
`조로아스터교가 창시된 시기는 [[아케메네스 왕조 페르시아]] 시기이다.`,
`사산 왕조 페르시아의 국교는 조로아스터교, 공용어는 [[페르시아어]]였다.`
]},
{no:"2쪽",title:"굽타 왕조와 힌두교 · 굽타 왕조의 문화",items:[
`4세기경 찬드라굽타 1세가 건국하고 갠지스강 유역을 차지한 왕조는 [[굽타 왕조]]이다.`,
`굽타 왕조의 전성기를 이끌어 북인도 대부분을 통일한 왕은 [[찬드라굽타 2세]]이다.`,
`찬드라굽타 2세는 벵골만에서 [[아라비아해]]까지 영토를 넓혔다.`,
`굽타 왕조는 사산 왕조 페르시아, 로마, [[중국]] 등과 교류하며 번영하였다.`,
`굽타 왕조는 6세기 중엽 유목 민족의 침입과 [[왕위 다툼]]으로 멸망하였다.`,
`브라만교, 불교, 민간 신앙이 융합되어 성립한 종교는 [[힌두교]]이다.`,
`힌두교는 브라흐마, 비슈누, [[시바]] 등을 섬기는 다신교이다.`,
`힌두교는 제사 의식을 [[간소화]]하고 토착적 성격을 띠어 빠르게 확산되었다.`,
`힌두교는 [[굽타 왕조]]의 후원을 받으며 인도의 대표 종교가 되었다.`,
`힌두교는 카스트제에 따른 신분 차별을 [[인정]]하였다.`,
`카스트에 따른 의무와 규범을 담아 정비된 법전은 『[[마누 법전]]』이다.`,
`힌두교의 확산으로 [[불교]]가 쇠퇴하고 카스트제가 강화되었다.`,
`굽타 왕조 시기에는 인도 [[고전 문화]]가 확립되었다.`,
`인도의 신화와 전설을 담은 서사시는 『마하바라타』와 『[[라마야나]]』이다.`,
`서사시 『마하바라타』 등은 [[산스크리트어]]로 정리되었다.`,
`간다라 양식과 인도 고유 양식이 융합되어 나타난 미술 양식은 [[굽타 양식]]이다.`,
`굽타 양식의 대표적 유적으로 아잔타 석굴과 [[엘로라]] 석굴이 있다.`,
`굽타 왕조의 천문학에서는 원주율을 이용하여 [[지구 둘레]]를 계산하였다.`,
`굽타 왕조의 천문학자들은 지구의 [[자전]]을 밝혀냈다.`,
`굽타 왕조의 수학에서는 최초로 '[[0|영]]'의 개념과 10진법을 사용하였다.`,
`굽타 왕조의 '0(영)' 개념은 후에 [[아라비아 숫자]]에 영향을 주었다.`
]},
{no:"3쪽",title:"이슬람교의 성립 · 무함마드 시대와 정통 칼리프 시대",items:[
`6세기 후반 비잔티움 제국과 사산 왕조 페르시아의 대립으로 [[아라비아반도]]를 지나는 새 교역로가 활성화되었다.`,
`새 교역로의 활성화로 무역 중심지가 된 두 도시는 메카와 [[메디나]]이다.`,
`메카·메디나의 번성으로 소수 [[귀족]]이 상업적 이익을 독점하며 빈부 격차가 심화되었다.`,
`이슬람교를 창시한 메카의 상인 출신 인물은 [[무함마드]]이다.`,
`이슬람교의 창시자는 메카의 [[상인]] 출신이었다.`,
`이슬람교는 다신교를 비판하고 유일신 [[알라]]에 대한 절대복종을 강조하였다.`,
`이슬람교는 알라에 대한 절대복종과 함께 [[우상 숭배]]를 금지하였다.`,
`이슬람교는 신 앞에서의 [[평등]]을 강조하여 하층민의 지지를 받았다.`,
`이슬람교의 평등 강조는 메카 보수 [[귀족]]의 반대를 불러왔다.`,
`무함마드가 메카 귀족의 탄압을 피해 메디나로 근거지를 옮긴 사건은 [[헤지라]]이다(622).`,
`'헤지라'는 '[[성스러운 이주]]'라는 의미이다.`,
`무함마드는 메디나로 근거지를 옮긴 뒤 메카에서 [[메디나]]로의 이주를 통해 교세를 확장하였다.`,
`무함마드는 정치와 종교가 일치된 [[이슬람 공동체]]를 형성하였다.`,
`무함마드는 630년 [[메카]]를 정복하고 아라비아반도 대부분을 통일하였다.`,
`이슬람 세계의 정치적 지배자이자 종교적 지도자를 [[칼리프]]라 한다.`,
`무함마드 사후 4대까지 칼리프를 [[선출]]한 시기를 정통 칼리프 시대라 한다.`,
`정통 칼리프 시대는 [[632]]년부터 661년까지이다.`,
`정통 칼리프 시대에 이슬람 세력은 시리아와 이집트, [[사산 왕조 페르시아]]를 정복하였다.`,
`이슬람 세력은 정복지 주민에게 이슬람교를 [[강요]]하지 않았다.`,
`정통 칼리프 시대에 이슬람교로 개종하면 세금인 [[지즈야]]를 면제해 주었다.`,
`평등 강조와 개종 시 지즈야 면제로 [[이슬람교]]가 빠르게 확산되었다.`,
`무함마드는 7세기 초 [[메카]]에서 이슬람교를 정립하였다.`
]},
{no:"4쪽",title:"우마이야 왕조와 아바스 왕조 · 이슬람의 사회와 경제",items:[
`4대 칼리프 알리 피살 후 칼리프를 세습하며 성립한 왕조는 [[우마이야 왕조]]이다.`,
`우마이야 왕조의 정통성을 두고 이슬람 세력은 시아파와 [[수니파]]로 분파되었다.`,
`우마이야 왕조의 수도는 [[다마스쿠스]]이다.`,
`우마이야 왕조는 중앙아시아, 북아프리카, 유럽의 [[이베리아반도]]를 장악하였다.`,
`우마이야 왕조는 비아랍인의 관직 진출을 제한하는 [[아랍인 우대]] 정책을 실시하였다.`,
`우마이야 왕조에서 비아랍인은 더 많은 [[세금]]을 부담하였다.`,
`우마이야 왕조에서 칼리프 자리는 우마이야 가문이 [[세습]]하였다.`,
`아바스 왕조의 수도는 [[바그다드]]이다.`,
`아바스 왕조는 당과의 [[탈라스]] 전투에서 승리하여 동서 교역로를 장악하였다.`,
`아바스 왕조는 세금 차별을 폐지하여 [[아랍인 우대]] 정책을 폐지하였다.`,
`아바스 왕조 시기 칼리프의 권한은 점차 [[종교 지도자]]로 축소되었다.`,
`아바스 왕조는 13세기 [[몽골]]에 의해 멸망하였다(1258).`,
`이베리아반도에 우마이야 왕조의 일부가 건설한 왕조는 [[후우마이야 왕조]]이다.`,
`북아프리카에 성립하여 지중해와 인도양 무역을 주도한 왕조는 [[파티마 왕조]]이다.`,
`이슬람교의 경전으로 일상생활의 규범이 된 것은 『[[쿠란]]』이다.`,
`『쿠란』은 [[아랍어]]로 쓰였으며 원칙적으로 다른 언어로 번역이 금지되었다.`,
`이슬람교도의 5행은 신앙 고백, 예배, 금식, 희사, 성지 [[순례]]이다.`,
`이슬람교도의 5행 중 라마단 기간에 행하는 것은 [[금식]]이다.`,
`이슬람교도가 순례해야 하는 성지는 [[메카]]이다.`,
`이슬람 사회는 상업 행위를 통한 부 축적을 [[긍정]]하였다.`,
`동서 무역의 거점으로 세계 시장으로 성장한 아바스 왕조의 수도는 [[바그다드]]이다.`,
`이슬람 제국에서는 금·은을 화폐로 사용하고 [[어음]]과 수표를 이용하였다.`
]},
{no:"5쪽",title:"이슬람의 문화 · 프랑크 왕국",items:[
`이슬람 제국의 확장으로 이슬람교와 아랍어를 공통 요소로 하는 [[이슬람 문화권]]이 형성되었다.`,
`둥근 지붕인 돔과 뾰족한 탑을 특징으로 하는 이슬람 사원은 [[모스크]]이다.`,
`우상 숭배 금지 교리로 모스크 내부는 추상적 무늬인 [[아라베스크]]로 장식되었다.`,
`모스크 내부 장식에 인물·동물 표현 대신 쓰인 추상 무늬는 [[아라베스크]]이다.`,
`아라비아·페르시아·인도·이집트 등지의 설화 모음집은 『[[아라비안나이트]]』이다.`,
`『의학전범』을 저술해 의학 정보를 집대성한 인물은 [[이븐시나]]이다.`,
`이슬람 천문학에서 항해술 발달에 기여한 관측 기구는 [[아스트롤라베]]이다.`,
`이슬람의 [[연금술]]은 오늘날 화학 용어의 유래가 되었다.`,
`이슬람 수학은 인도의 '[[0|영]]' 개념을 받아들여 아라비아 숫자를 완성하였다.`,
`유럽 북부 발트해 연안에 거주한 민족은 [[게르만족]]이다.`,
`4세기 말 [[훈족]]의 압박으로 게르만족이 로마 제국 내로 대규모 이동하였다.`,
`게르만족의 이동으로 [[서로마 제국]]이 멸망하였다(476).`,
`게르만족이 세운 국가 중 크리스트교를 받아들여 오래 번성한 나라는 [[프랑크 왕국]]이다.`,
`프랑크 왕국은 8세기 초 서유럽에 침입한 [[이슬람]] 세력을 막아내 크리스트교 세계를 보호하였다.`,
`프랑크 왕국의 전성기를 이끈 인물은 [[카롤루스 대제]]이다.`,
`카롤루스 대제는 로마 교황으로부터 [[서로마 황제]]의 관을 받았다.`,
`카롤루스 대제는 궁정과 수도원에 [[학교]]를 세워 학문과 예술을 발전시켰다.`,
`프랑크 왕국에서 게르만 문화, 로마 문화, [[크리스트교]]가 융합되어 서유럽 문화의 기틀이 마련되었다.`,
`카롤루스 대제 사후 제국은 서·중·동프랑크로 [[분열]]되었다.`,
`프랑크 왕국의 분열은 오늘날 프랑스, 이탈리아, [[독일]]의 기원이 되었다.`,
`게르만족의 이동을 촉발한 아시아계 유목 민족은 [[훈족]]이다.`,
`이슬람 문화권의 공통 요소는 이슬람교와 [[아랍어]]이다.`
]},
{no:"6쪽",title:"비잔티움 제국 · 비잔티움 제국의 문화",items:[
`서로마 멸망 후에도 약 1000년간 지속된 동로마 제국을 [[비잔티움 제국]]이라 한다.`,
`비잔티움 제국의 수도는 비잔티움, 곧 [[콘스탄티노폴리스]]이다.`,
`비잔티움 제국의 수도는 유럽과 아시아를 잇는 교역로에 위치해 [[동서 무역]]의 중심지로 번성하였다.`,
`비잔티움 제국은 황제가 종교적 권한까지 가진 [[중앙 집권]] 체제였다.`,
`비잔티움 제국의 전성기를 이끈 6세기의 황제는 [[유스티니아누스]] 황제이다.`,
`유스티니아누스 황제는 옛 로마 제국의 영토 상당 부분을 [[회복]]하였다.`,
`유스티니아누스 황제가 로마법을 집대성하여 편찬한 법전은 『[[유스티니아누스 법전]]』이다.`,
`『유스티니아누스 법전』은 『[[로마법 대전]]』이라고도 불린다.`,
`유스티니아누스 황제 때 건축된 비잔티움 양식의 대표 건축물은 [[성 소피아 대성당]]이다.`,
`비잔티움 제국에 침입하여 영토 상실을 가져온 세력은 사산 왕조 페르시아와 [[이슬람]] 세력이다.`,
`비잔티움 제국은 11세기 이후 귀족·교회의 대토지 소유와 [[자영농]] 몰락으로 쇠퇴하였다.`,
`비잔티움 제국은 1453년 [[오스만 제국]]에 의해 멸망하였다.`,
`비잔티움 제국의 문화는 그리스 정교, 그리스·로마 문화, [[헬레니즘]] 문화가 융합된 것이다.`,
`비잔티움 제국의 공용어는 [[그리스어]]였다.`,
`비잔티움 제국은 그리스·로마 고전을 연구하여 서유럽에 전달해 [[르네상스]]에 영향을 주었다.`,
`비잔티움 문화는 슬라브족에게 전파되어 [[동유럽]] 문화의 토대가 되었다.`,
`거대한 돔과 모자이크 벽화를 특징으로 하는 건축 양식은 [[비잔티움 양식]]이다.`,
`비잔티움 제국 황제 [[레오 3세]]의 성상 숭배 금지령으로 동·서 교회가 대립하였다.`,
`성상 숭배 문제로 1054년 동·서 교회가 [[분열]]되었다.`,
`동·서 교회 분열로 서유럽에는 로마 교황 중심의 [[로마 가톨릭]]이 형성되었다.`,
`동·서 교회 분열로 동유럽에는 비잔티움 황제가 수장이 되는 [[그리스 정교]]가 형성되었다.`,
`로마 교황은 [[게르만족]] 포교에 성상이 필요하다며 성상 숭배 금지령을 거부하였다.`
]}
]},
"3-3":{short:"서유럽·교류 갈등",pages:[
{no:"1쪽",title:"서유럽의 봉건제 · 중세 서유럽의 문화",items:[
`프랑크 왕국의 분열과 바이킹·이슬람 세력 등 [[이민족]]의 침입 속에 봉건제가 성립되었다.`,
`각 지방 유력자들이 성을 쌓고 무장하여 형성한 세력은 [[기사]] 세력이다.`,
`주군과 봉신 사이에 맺어진 관계를 [[주종 관계]]라 한다.`,
`주군은 기사에게 토지인 [[봉토]]를 주어 봉신으로 삼았다.`,
`봉신은 주군에게 충성과 [[봉사]]를 맹세하였다.`,
`서유럽 봉건제의 주종 관계는 혈연이 아닌 [[계약]] 관계였다.`,
`봉신이 주군에게 받은 토지로 자급자족적 농촌 공동체를 [[장원]]이라 한다.`,
`봉신은 장원의 [[영주]]가 되어 주군의 간섭 없이 독자적으로 운영하였다.`,
`봉신이 장원을 독자적으로 운영하면서 봉건제는 [[지방 분권]]적 성격을 띠었다.`,
`장원의 농민으로 영주에게 예속된 신분을 [[농노]]라 한다.`,
`농노는 거주 이전의 [[자유]]가 없었다.`,
`농노는 노예와 달리 [[결혼]]하여 가정을 가질 수 있었다.`,
`농노는 노예와 달리 약간의 [[재산]] 소유가 가능하였다.`,
`중세 서유럽에서는 크리스트교와 [[신]] 중심의 문화가 발달하였다.`,
`중세 서유럽의 공용어는 [[라틴어]]였다.`,
`신앙과 이성의 조화를 강조한 철학은 [[스콜라 철학]]이다.`,
`『신학 대전』을 저술하여 스콜라 철학을 집대성한 인물은 [[토마스 아퀴나스]]이다.`,
`높은 첨탑과 스테인드글라스(색유리그림)를 특징으로 하는 건축 양식은 [[고딕 양식]]이다.`,
`고딕 양식의 대표 건축물로 독일 쾰른 대성당과 프랑스 [[샤르트르]] 대성당이 있다.`,
`학문의 발달로 12세기 이후 자치적으로 운영된 교육 기관인 [[대학]]이 설립되었다.`,
`기사의 영웅담이나 사랑을 소재로 한 문학을 [[기사도 문학]]이라 한다.`,
`기사도 문학의 대표작으로 『롤랑의 노래』와 『[[아서왕 이야기]]』가 있다.`
]},
{no:"2쪽",title:"교황권의 강화 · 십자군 전쟁",items:[
`국왕이나 제후가 성직자 임명권을 행사하면서 교회가 [[세속화]]되었다.`,
`10세기 수도원을 중심으로 일어난 교회 개혁 운동을 [[수도원 운동]]이라 한다.`,
`기도, 고전 연구, 노동에 집중하는 삶을 강조한 수도원은 [[클뤼니]] 수도원이다.`,
`성직자 임명권을 둘러싸고 교황과 황제가 대립해 황제가 굴복한 사건은 [[카노사의 굴욕]]이다(1077).`,
`카노사의 굴욕 당시 교황은 [[그레고리우스 7세]]였다.`,
`카노사의 굴욕 당시 신성 로마 제국 황제는 [[하인리히 4세]]였다.`,
`카노사의 굴욕에서 황제가 교황에게 용서를 빌면서 [[교황권]]이 강화되었다.`,
`1122년 교황이 성직자 임명권을 갖는 것으로 결정한 협약은 [[보름스 협약]]이다.`,
`보름스 협약으로 성직자 임명권은 [[교황]]에게 있음이 결정되었다.`,
`13세기 교황권의 전성기를 '교황은 해, 황제는 [[달]]'에 비유하였다.`,
`11세기 후반 셀주크 튀르크가 [[예루살렘]]을 점령하고 비잔티움 제국을 압박하였다.`,
`셀주크 튀르크의 압박으로 비잔티움 황제가 도움을 요청하자 로마 교황이 [[성지 회복]]을 호소하였다.`,
`유럽의 제후·기사·상인·농민 등이 결성한 군대를 [[십자군]]이라 한다.`,
`십자군 전쟁은 [[1096]]년에 시작되어 약 200여 년간 전개되었다.`,
`십자군 전쟁은 종교적 신념에서 시작되었으나 점차 각자의 [[이익]] 추구로 변질되었다.`,
`십자군 전쟁은 결국 [[성지 회복]]에 실패하였다.`,
`십자군 전쟁의 결과 전쟁을 주도한 [[교황권]]이 약화되었다.`,
`십자군 전쟁으로 전쟁에 참여한 제후와 [[기사]] 세력이 몰락하였다.`,
`제후와 기사의 몰락으로 상대적으로 [[국왕]]의 권한이 강화되었다.`,
`십자군 전쟁으로 동방 무역이 발달하고 상공업과 [[도시]]가 성장하였다.`,
`십자군 전쟁으로 비잔티움 문화와 [[이슬람]] 문화가 유입되어 서유럽 문화가 발전하였다.`,
`십자군 전쟁을 일으킨 직접적 계기는 셀주크 튀르크의 [[예루살렘]] 점령이었다.`
]},
{no:"3쪽",title:"도시의 성장과 장원의 해체 · 지중해 무역권의 발달",items:[
`11세기 이후 농업 생산력 증대와 잉여 생산물 증가로 [[상공업]]이 발달하며 도시가 성장하였다.`,
`도시의 상인과 수공업자가 만든 동업 조합을 [[길드]]라 한다.`,
`길드는 도시 운영에 참여하고 영주로부터 [[자치권]]을 획득하였다.`,
`길드는 영주로부터 무력 또는 [[돈]]으로 자치권을 얻었다.`,
`상업 발달로 화폐가 사용되면서 영주는 농노에게 노동력·현물 대신 [[화폐]]로 세금을 거두었다.`,
`14세기 중엽 유럽에서 인구 감소와 노동력 부족을 가져온 전염병은 [[흑사병]]이다.`,
`흑사병 유행은 [[14]]세기 중엽에 일어났다.`,
`흑사병으로 노동력이 부족해지자 영주들은 농민의 [[처우]]를 개선하였다.`,

const order=["1-1","2-1","2-2","2-3","3-1","3-2","3-3","4-1","4-2","4-3"];

/* ===== utils ===== */
const $=(s,r=document)=>r.querySelector(s);
function norm(s){return (s||'').trim().toLowerCase().replace(/\s+/g,'').replace(/[''`]/g,"'").replace(/[（）()]/g,'');}
function parse(text){
  const answers=[];let i=0;
  const html=text.replace(/\[\[(.+?)\]\]/g,(m,grp)=>{
    const alts=grp.split('|').map(s=>s.trim());const idx=i++;answers.push(alts);
    const w=Math.max(64,Math.min(190,alts[0].length*17+30));
    return `<span class="blank"><input data-i="${idx}" style="width:${w}px" autocomplete="off" autocapitalize="off" spellcheck="false"><span class="ansnote" data-i="${idx}">${alts[0]}</span></span>`;
  });
  return {html,answers};
}

/* ===== build flat stage list ===== */
const STAGES=[];           // {id, lesson, pi, no, title, items, count}
const LESSONS=[];          // {key, short, stages:[idx...]}
order.forEach(k=>{
  const d=BANK[k];const grp={key:k,short:d.short,stages:[]};
  d.pages.forEach((pg,pi)=>{
    const items=pg.items.filter((_,i)=>i%2===0);   // 50% 축소: 짝수 인덱스만 사용
    let count=0;items.forEach(it=>count+=(it.match(/\[\[.+?\]\]/g)||[]).length);
    const id=k+'#'+pi;
    STAGES.push({id,lesson:k,pi,no:pg.no,title:pg.title,items:items,count});
    grp.stages.push(STAGES.length-1);
  });
  LESSONS.push(grp);
});
const TOTAL_STAGES=STAGES.length;
function stageById(id){return STAGES.find(s=>s.id===id);}

/* ===== progress / persistence ===== */
const SAVEKEY='hb_2_6_v1';
let P={best:{},finaleBest:0,review:false};
function load(){try{const r=localStorage.getItem(SAVEKEY);if(r)P=Object.assign(P,JSON.parse(r));}catch(e){}}
function save(){try{localStorage.setItem(SAVEKEY,JSON.stringify(P));}catch(e){}}
load();

/* ===== scoring / level ===== */
function starsOf(id){const s=stageById(id);const b=P.best[id]||0;const acc=b/s.count;
  if(acc>=0.95)return 3;if(acc>=0.8)return 2;if(acc>=0.6)return 1;return 0;}
function clearedCount(){return STAGES.filter(s=>starsOf(s.id)>=1).length;}
function totalStars(){return STAGES.reduce((a,s)=>a+starsOf(s.id),0);}
function totalXP(){
  let xp=0;STAGES.forEach(s=>{xp+=(P.best[s.id]||0)*10;xp+=starsOf(s.id)*100;});
  xp+=(P.finaleBest||0)*15;return xp;}
const LV=[
  {xp:0,t:'역사 쌩초보'},{xp:600,t:'빈칸 견습생'},{xp:1500,t:'암기 일꾼'},
  {xp:2800,t:'연표 정복자'},{xp:4200,t:'사료 사냥꾼'},{xp:5800,t:'왕조 파괴자'},
  {xp:7600,t:'역사 광전사'},{xp:9600,t:'골든벨 후보생'},{xp:11800,t:'2-6 역사 패왕'},
  {xp:14000,t:'최후의 1인 👑'}
];
function levelInfo(xp){
  let lv=1;for(let i=0;i<LV.length;i++){if(xp>=LV[i].xp)lv=i+1;}
  const cur=LV[lv-1];const next=LV[lv]||null;
  const prog=next?Math.min(1,(xp-cur.xp)/(next.xp-cur.xp)):1;
  return {lv,title:cur.t,curXp:cur.xp,nextXp:next?next.xp:cur.xp,prog,max:!next};
}
function lessonUnlocked(li){
  if(P.review||li===0)return true;
  const prev=LESSONS[li-1];const cl=prev.stages.filter(i=>starsOf(STAGES[i].id)>=1).length;
  return cl/prev.stages.length>=0.6;
}
function finaleUnlocked(){return STAGES.every(s=>starsOf(s.id)>=1);}

/* ===== render player ===== */
function renderPlayer(){
  const xp=totalXP();const L=levelInfo(xp);
  $('#pLv').textContent=L.lv;$('#pTitle').textContent=L.title;
  $('#pStars').textContent=totalStars();$('#pClear').textContent=clearedCount();
  $('#xpFill').style.width=(L.prog*100)+'%';
  $('#xpNow').textContent=xp.toLocaleString()+' XP';
  $('#xpNext').textContent=L.max?'최고 레벨 달성!':('다음 레벨까지 '+(L.nextXp-xp).toLocaleString());
}

/* ===== render finale card ===== */
function renderFinale(){
  const open=finaleUnlocked();
  $('#finaleCard').innerHTML=
    `<div class="finale-card ${open?'':'locked'}">
       <span class="fx">🔔</span>
       <h3 class="han">👑 최후의 1인 골든벨</h3>
       <p>${open?'전 스테이지 클리어 완료! 랜덤 30문제 서바이벌. 목숨 3개, 최후까지 살아남아라.':'모든 스테이지를 ★ 1개 이상으로 클리어하면 열립니다. ('+clearedCount()+'/'+TOTAL_STAGES+')'}</p>
       <button class="btn" ${open?'onclick="startFinale()"':''}>${open?'결승전 입장':'🔒 잠김'}</button>
     </div>`;
}

/* ===== render worlds/map ===== */
function renderWorlds(){
  const el=$('#worlds');
  el.innerHTML=LESSONS.map((g,li)=>{
    const unlocked=lessonUnlocked(li);
    const cl=g.stages.filter(i=>starsOf(STAGES[i].id)>=1).length;
    const st=g.stages.reduce((a,i)=>a+starsOf(STAGES[i].id),0);
    const maxst=g.stages.length*3;
    const chips=g.stages.map(i=>{
      const s=STAGES[i];const stars=starsOf(s.id);
      const slocked=!unlocked;
      const star=`<span class="stars">${'★'.repeat(stars)}<span class="e">${'★'.repeat(3-stars)}</span></span>`;
      return `<div class="stage ${slocked?'locked':''}" ${slocked?'':`onclick="openStage('${s.id}')"`}>
        <span class="sno">${s.no}</span><span class="stt">${s.title}</span>${slocked?'<span class="stars">🔒</span>':star}</div>`;
    }).join('');
    return `<div class="world ${unlocked?'':'locked'}" data-li="${li}">
      <div class="whead" onclick="toggleWorld(${li})">
        <div class="wno">${g.key}</div>
        <div class="wtitle"><b>${g.short}</b><small>${g.stages.length}개 스테이지 · ${s_label(li)}</small></div>
        <div class="wmeta">${unlocked?`★${st}/${maxst} · ${cl}/${g.stages.length}`:'<span class="lk">🔒 잠김</span>'}</div>
        <span class="chev">▶</span>
      </div>
      <div class="stages">${chips}</div>
    </div>`;
  }).join('');
}
function s_label(li){const names={'1-1':'1단원','2-1':'2단원','2-2':'2단원','2-3':'2단원','3-1':'3단원','3-2':'3단원','3-3':'3단원','4-1':'4단원','4-2':'4단원','4-3':'4단원'};return names[LESSONS[li].key]||'';}
let openWorld=0;
function toggleWorld(li){
  const w=document.querySelector(`.world[data-li="${li}"]`);
  if(!w)return;
  if(!lessonUnlocked(li)){toast('이전 단원을 60% 이상 클리어하면 열려요 🔒');return;}
  document.querySelectorAll('.world.open').forEach(x=>{if(x!==w)x.classList.remove('open')});
  w.classList.toggle('open');
}

/* ===== quiz ===== */
let curStage=null,revealed=false;
function openStage(id){
  curStage=stageById(id);revealed=false;
  $('#qTitle').textContent=curStage.title;
  $('#qSub').textContent=`${curStage.lesson} · ${curStage.no} · 빈칸 ${curStage.count}개`;
  $('#qBody').innerHTML=curStage.items.map((it,qi)=>{
    const p=parse(it);
    return `<div class="q"><div class="qn">${qi+1}</div><div class="qt" data-ans='${JSON.stringify(p.answers)}'>${p.html}</div></div>`;
  }).join('');
  $('#revealBtn').textContent='정답';
  document.querySelectorAll('#qBody input').forEach(inp=>{
    inp.addEventListener('blur',()=>checkOne(inp));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();checkOne(inp);
      const all=[...document.querySelectorAll('#qBody input')];const ni=all.indexOf(inp)+1;if(all[ni])all[ni].focus();}});
  });
  $('#home').classList.add('hidden');$('#quiz').classList.remove('hidden');
  window.scrollTo(0,0);
}
function goHome(){
  $('#quiz').classList.add('hidden');$('#home').classList.remove('hidden');
  refresh();
}
function toggleReveal(){
  revealed=!revealed;
  document.querySelectorAll('#qBody .qt').forEach(qt=>{
    const ans=JSON.parse(qt.dataset.ans);
    qt.querySelectorAll('input').forEach(inp=>{
      const note=qt.querySelector('.ansnote[data-i="'+inp.dataset.i+'"]');
      if(revealed){note.classList.add('show');inp.placeholder=ans[+inp.dataset.i][0];}
      else{note.classList.remove('show');inp.placeholder='';}
    });
  });
  $('#revealBtn').textContent=revealed?'숨기기':'정답';
}
function checkOne(inp){
  const qt=inp.closest('.qt');if(!qt)return;
  const ans=JSON.parse(qt.dataset.ans);const alts=ans[+inp.dataset.i].map(norm);
  const note=qt.querySelector('.ansnote[data-i="'+inp.dataset.i+'"]');
  inp.classList.remove('ok','no');
  if(norm(inp.value)===''){note.classList.remove('show');return;}
  if(alts.includes(norm(inp.value))){inp.classList.add('ok');note.classList.remove('show');}
  else{inp.classList.add('no');note.classList.add('show');}   // 오답이면 즉시 정답 표시
}
function gradeStage(){
  let total=0,ok=0;
  document.querySelectorAll('#qBody .qt').forEach(qt=>{
    const ans=JSON.parse(qt.dataset.ans);
    qt.querySelectorAll('input').forEach(inp=>{
      total++;const alts=ans[+inp.dataset.i].map(norm);
      const note=qt.querySelector('.ansnote[data-i="'+inp.dataset.i+'"]');
      inp.classList.remove('ok','no');note.classList.remove('show');
      if(norm(inp.value)!=='' && alts.includes(norm(inp.value))){inp.classList.add('ok');ok++;}
      else{inp.classList.add('no');note.classList.add('show');}
    });
  });
  const before=totalXP(),beforeLv=levelInfo(before).lv;
  const prevBest=P.best[curStage.id]||0;
  if(ok>prevBest){P.best[curStage.id]=ok;save();}
  const after=totalXP(),afterLv=levelInfo(after).lv;
  showResult(ok,total,after-before,afterLv>beforeLv?afterLv:0);
}
function showResult(ok,total,gain,lvUp){
  const acc=Math.round(ok/total*100);
  const stars=acc>=95?3:acc>=80?2:acc>=60?1:0;
  const starHtml='★'.repeat(stars)+`<span class="e">${'★'.repeat(3-stars)}</span>`;
  const msg=stars===3?'완벽! 다 뿌셨다 🔥':stars===2?'좋아, 거의 다 왔어!':stars===1?'클리어! 한 번 더 노려보자':'아직이야, 정답 보고 다시!';
  const idx=STAGES.indexOf(curStage);const nextS=STAGES[idx+1];
  const nextOk=nextS && lessonUnlocked(LESSONS.findIndex(g=>g.key===nextS.lesson));
  $('#modal').innerHTML=
    `<div class="bigstars">${starHtml}</div>
     <h2 class="han">${ok} / ${total} 정답</h2>
     <div class="acc">정답률 ${acc}% · ${msg}</div>
     ${lvUp?`<div class="lvlup">🎉 LEVEL UP! Lv.${lvUp} ${LV[lvUp-1].t}</div>`:''}
     <div class="xpget ${gain>0?'':'none'}">${gain>0?'+'+gain+' XP':'기록 갱신 없음'}</div>
     <div class="mbtns">
       <button class="sec" onclick="closeModal();openStage('${curStage.id}')">다시</button>
       ${nextS?`<button class="pri" onclick="closeModal();${nextOk?`openStage('${nextS.id}')`:`goHome()`}">${nextOk?'다음 ▶':'지도로'}</button>`:`<button class="pri" onclick="closeModal();goHome()">지도로</button>`}
     </div>`;
  $('#scrim').classList.add('show');
  if(lvUp)toast('🎉 레벨 업! Lv.'+lvUp+' '+LV[lvUp-1].t);
}
function closeModal(){$('#scrim').classList.remove('show');}

/* ===== finale (golden bell) ===== */
let F=null;
function startFinale(){
  if(!finaleUnlocked())return;
  const pool=[];
  STAGES.forEach(s=>s.items.forEach(it=>{if((it.match(/\[\[.+?\]\]/g)||[]).length===1)pool.push(it);}));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  F={qs:pool.slice(0,30),idx:0,lives:3,score:0};
  $('#finale').classList.remove('hidden');renderFinaleQ();
}
function renderFinaleQ(){
  if(F.idx>=F.qs.length||F.lives<=0){return finaleEnd();}
  const p=parse(F.qs[F.idx]);
  $('#finale').innerHTML=
    `<div class="ftop">
       <span class="lives">${'❤️'.repeat(F.lives)}${'🤍'.repeat(3-F.lives)}</span>
       <span class="fprog">${F.idx+1} / ${F.qs.length}</span>
       <span class="fscore">🔔 ${F.score}</span>
       <button class="fclose" onclick="quitFinale()">나가기</button>
     </div>
     <div class="fcard" id="fcard">
       <div class="qlabel">최후의 1인 골든벨</div>
       <div class="ftext" data-ans='${JSON.stringify(p.answers)}'>${p.html}</div>
       <button class="fsubmit" onclick="finaleSubmit()">제출 ⏎</button>
     </div>`;
  const inp=$('#finale input');if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')finaleSubmit();});}
}
function finaleSubmit(){
  const t=$('#finale .ftext');const ans=JSON.parse(t.dataset.ans);
  const inp=t.querySelector('input');const alts=ans[0].map(norm);
  const correct=norm(inp.value)!=='' && alts.includes(norm(inp.value));
  inp.classList.add(correct?'ok':'no');
  const note=t.querySelector('.ansnote');note.classList.add('show');
  if(correct){F.score++;}else{F.lives--;$('#fcard').classList.add('flash');}
  $('#finale .fscore').textContent='🔔 '+F.score;
  $('#finale .lives').innerHTML='❤️'.repeat(Math.max(0,F.lives))+'🤍'.repeat(3-Math.max(0,F.lives));
  $('#finale .fsubmit').textContent=correct?'정답! 다음 ▶':'땡! 다음 ▶';
  $('#finale .fsubmit').onclick=()=>{F.idx++;renderFinaleQ();};
}
function finaleEnd(){
  if(F.score>(P.finaleBest||0)){P.finaleBest=F.score;save();}
  const win=F.lives>0 && F.idx>=F.qs.length;
  const rank=F.score>=28?'최후의 1인 👑':F.score>=22?'2-6 역사 패왕':F.score>=15?'골든벨 준결승급':F.score>=8?'성장하는 도전자':'다음엔 더 멀리';
  $('#finale').innerHTML=
    `<div class="fcard fend">
       <div class="big">${win?'👑':F.score>=15?'🔔':'💪'}</div>
       <h2 class="han">${win?'최후의 1인 등극!':'골든벨 종료'}</h2>
       <div>30문제 중 <b>${F.score}</b>문제 정답</div>
       <div class="rank">${rank}</div>
       <div><button onclick="startFinale()">다시 도전</button> <button onclick="quitFinale()">지도로</button></div>
     </div>`;
}
function quitFinale(){$('#finale').classList.add('hidden');refresh();}

/* ===== misc ===== */
let to;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(to);to=setTimeout(()=>t.classList.remove('show'),2000);}
$('#reviewBtn').onclick=()=>{P.review=!P.review;save();$('#reviewBtn').classList.toggle('on',P.review);toast(P.review?'복습 모드 ON · 전체 잠금 해제':'복습 모드 OFF');refresh();};
function refresh(){renderPlayer();renderFinale();renderWorlds();
  const tb=$('#totBlanks');if(tb)tb.textContent=STAGES.reduce((a,s)=>a+s.count,0);
  const w=document.querySelector(`.world[data-li="${openWorld}"]`);if(w&&lessonUnlocked(openWorld))w.classList.add('open');
  $('#reviewBtn').classList.toggle('on',P.review);}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&!$('#quiz').classList.contains('hidden'))gradeStage();});

refresh();
</script>
</body>
